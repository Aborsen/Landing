<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: #0A0E13;
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}

body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(10,152,150,.09) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, rgba(110,60,200,.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, rgba(20,80,200,.05) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(160,50,220,.045) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, rgba(10,152,150,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, rgba(50,90,240,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(200,60,180,.03) 0%, transparent 55%);
}

:root {
  --mint:#0A9896; --mint-dk:#077270; --mint-lt:#0EC4C1;
  --mint-vivid:#13D4D1;
  --mint-glow:rgba(10,152,150,.45);
  --fd:'Outfit',sans-serif;
  --fb:'Geist',sans-serif;
  --fm:'Geist Mono',monospace;
}
h1, h2, h3 { font-family: 'Outfit', sans-serif; letter-spacing: -0.04em; line-height: 1.05; text-wrap: balance; }
p { text-wrap: pretty; }
.text-gradient { background:linear-gradient(135deg, #fff 30%, #0EC4C1 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.cta-btn { transition:all 0.25s cubic-bezier(0.34,1.56,0.64,1); }
.cta-btn:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(9,160,157,0.3); }
.cta-btn:active { transform:translateY(1px) scale(0.98); }
.spotlight-card { position:relative; overflow:hidden; transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease; }
.spotlight-card::before { content:''; position:absolute; inset:0; border-radius:inherit; padding:1px; background:radial-gradient(600px circle at var(--mouse-x,50%) var(--mouse-y,50%), rgba(14,196,193,0.12), transparent 40%); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none; }
.spotlight-card:hover { transform:translateY(-3px); box-shadow:0 12px 40px rgba(9,160,157,0.08); }

@keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes corePulse {
  0%,40%,100%{box-shadow:0 0 0 8px rgba(7,128,126,.06),0 0 28px rgba(7,128,126,.15)}
  55%,75%{box-shadow:0 0 0 14px rgba(7,128,126,.15),0 0 56px rgba(7,128,126,.4)}
}
@keyframes chaosFloat {
  0% { transform: translateY(0px) rotate(var(--chaos-rot, 0deg)); }
  50% { transform: translateY(-4px) rotate(calc(var(--chaos-rot, 0deg) + 3deg)); }
  100% { transform: translateY(2px) rotate(calc(var(--chaos-rot, 0deg) - 2deg)); }
}

.fu0 { animation: fadeUp .7s cubic-bezier(0.34,1.56,0.64,1) both; }
.fu1 { animation: fadeUp .7s cubic-bezier(0.34,1.56,0.64,1) .1s both; }
.fu2 { animation: fadeUp .7s cubic-bezier(0.34,1.56,0.64,1) .2s both; }
.fu3 { animation: fadeUp .7s cubic-bezier(0.34,1.56,0.64,1) .35s both; }
.fu4 { animation: fadeUp .7s cubic-bezier(0.34,1.56,0.64,1) .5s both; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
section { position: relative; }

.connector-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px;
  cursor: default;
  position: relative;
}
.connector-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 10px; font-weight: 500;
  font-family: 'Geist Mono', monospace;
  letter-spacing: -.02em;
}

.q-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  font-size: 13px; color: #7FA0AC;
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.q-pill:hover {
  border-color: rgba(9,160,157,0.4);
  color: #E8F2F5;
  background: rgba(9,160,157,0.06);
}
.q-pill.active {
  border-color: rgba(9,160,157,0.5);
  color: #0EC4C1;
  background: rgba(9,160,157,0.08);
}

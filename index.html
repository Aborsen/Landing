<style>
  /* Reset, scroll-behavior, body font, focus-ring all come from Design System base.css */

  /* Marquee animations */
  @keyframes marquee-left {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  @keyframes marquee-right {
    0% { transform: translateX(-50%); }
    100% { transform: translateX(0); }
  }
  .marquee-left { animation: marquee-left 30s linear infinite; }
  .marquee-right { animation: marquee-right 30s linear infinite; }
  .marquee-left-slow { animation: marquee-left 40s linear infinite; }
  .marquee-right-slow { animation: marquee-right 40s linear infinite; }

  /* Pause on hover */
  .marquee-container:hover .marquee-left,
  .marquee-container:hover .marquee-right,
  .marquee-container:hover .marquee-left-slow,
  .marquee-container:hover .marquee-right-slow {
    animation-play-state: paused;
  }

  /* Pulse animation for core engine */
  @keyframes corePulse {
    0%, 100% { box-shadow: 0 0 20px rgba(7,128,126,0.2), 0 0 60px rgba(7,128,126,0.1); }
    50% { box-shadow: 0 0 30px rgba(7,128,126,0.4), 0 0 80px rgba(7,128,126,0.2); }
  }
  @keyframes streamFlow {
    0% { left: -40px; opacity: 0; }
    2% { opacity: 1; }
    40% { left: calc(100% + 40px); opacity: 0; }
    100% { left: calc(100% + 40px); opacity: 0; }
  }
  @keyframes cardBorderGlow {
    0%, 80% { opacity: 0; }
    85%, 92% { opacity: 1; }
    100% { opacity: 0; }
  }
  @keyframes cardGlow {
    0%, 80% { background: var(--ins-color-gray-800); border-color: var(--ins-color-gray-800); box-shadow: none; }
    85%, 92% { background: rgba(7,128,126,0.08); border-color: rgba(9,160,157,0.5); box-shadow: 0 0 16px rgba(9,160,157,0.15), inset 0 0 20px rgba(9,160,157,0.05); }
    100% { background: var(--ins-color-gray-800); border-color: var(--ins-color-gray-800); box-shadow: none; }
  }

  /* Flow animation for connector lines */
  @keyframes chaosFloat {
    0% { transform: translateY(0px) rotate(var(--chaos-rot, 0deg)); }
    50% { transform: translateY(-4px) rotate(calc(var(--chaos-rot, 0deg) + 3deg)); }
    100% { transform: translateY(2px) rotate(calc(var(--chaos-rot, 0deg) - 2deg)); }
  }
  @keyframes glitchLine {
    0% { opacity: 0; transform: translateX(-10%); }
    50% { opacity: 0.08; transform: translateX(5%); }
    100% { opacity: 0; transform: translateX(10%); }
  }
  @keyframes flowRight {
    0% { left: -30%; }
    100% { left: 130%; }
  }
  @keyframes flowLeft {
    0% { right: -30%; }
    100% { right: 130%; }
  }

  /* Blink cursor */
  @keyframes blink {
    0%, 50% { opacity: 1; }
    51%, 100% { opacity: 0; }
  }

  /* Progress bar animation */
  @keyframes progressFill {
    0% { width: 0%; }
    100% { width: 67%; }
  }

  /* Spin animation for loading */
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  /* Scrollbar styling (DS base.css also styles — these keep the 8px marketing-page width) */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--ins-surface-page); }
  ::-webkit-scrollbar-thumb { background: var(--ins-color-gray-700); border-radius: var(--ins-radius-sm); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ins-color-gray-600); }

/* Alias :root block removed — all call-sites now read from --ins-* tokens directly. */

body{overflow-x:hidden}

body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity:.4;mix-blend-mode:overlay
}

body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, var(--ins-color-teal-a-08) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, var(--ins-color-teal-a-08) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, var(--ins-color-teal-a-08) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(10,20,30,.04) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, var(--ins-color-teal-a-08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, var(--ins-color-teal-a-08) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(10,20,30,.02) 0%, transparent 55%);
}

.container{max-width:1060px;margin:0 auto;padding:0 48px;position:relative;z-index:1}
#showcase-mount .container{max-width:1280px;padding:0 24px}
.fade-in{opacity:0;transform:translateY(18px);transition:opacity .62s var(--ins-easing-standard),transform .62s var(--ins-easing-standard)}
.fade-in.visible{opacity:1;transform:translateY(0)}

/* NAV */
nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 48px;height:58px;
  background:transparent;
  backdrop-filter:none;-webkit-backdrop-filter:none;
  border-bottom:1px solid transparent;
  transition:background .3s,backdrop-filter .3s,border-color .3s
}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{
  display:flex;align-items:center;justify-content:center;
}
.logo-name{font-family:var(--ins-font-family-sans);font-size:16px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.03em}
.nav-links{display:flex;list-style:none;gap:2px}
.nav-links a{padding:6px 13px;font-size:13px;color:var(--ins-text-inactive);text-decoration:none;border-radius:var(--ins-radius-md);letter-spacing:-.01em;transition:all .15s}
.nav-links a:hover{color:var(--ins-text-heading);background:var(--ins-color-white-a-12)}
.nav-right{display:flex;align-items:center;gap:8px}
.btn-ghost{padding:7px 16px;font-size:13px;font-weight:500;color:var(--ins-text-body);background:transparent;border:none;border-radius:9px;cursor:pointer;text-decoration:none;transition:all .15s}
.btn-ghost:hover{color:var(--ins-text-heading);background:var(--ins-color-white-a-12)}
/* Primary button — matches "New Chat" pill in app exactly */
.btn-primary{
  position:relative;overflow:hidden;
  padding:9px 22px;font-size:13px;font-weight:500;color:#fff;
  background:linear-gradient(135deg,var(--ins-color-teal-300) 0%,var(--ins-color-teal-500) 60%,var(--ins-color-teal-650) 100%);
  border:none;border-radius:var(--ins-radius-pill);cursor:pointer;text-decoration:none;
  letter-spacing:-.01em;
  box-shadow:0 0 0 1px rgba(19,212,209,.3),0 2px 8px rgba(0,0,0,.4),0 0 28px var(--ins-color-teal-a-50);
  transition:all .2s var(--ins-easing-standard);
  display:inline-flex;align-items:center
}
.btn-primary::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 60%);
  border-radius:var(--ins-radius-pill)
}
.btn-primary:hover{
  box-shadow:0 0 0 1px rgba(19,212,209,.5),0 2px 8px rgba(0,0,0,.4),0 0 40px var(--ins-color-teal-a-50);
  transform:translateY(-1px)
}
.btn-primary:active{
  transform:translateY(0);
  box-shadow:0 0 0 1px rgba(19,212,209,.3),0 1px 4px rgba(0,0,0,.4),0 0 16px var(--ins-color-teal-a-50)
}


/* ORCHESTRATION */
.orch-header{text-align:center;margin-bottom:56px}
.section-label{
  display:inline-flex;align-items:center;gap:8px;
  font-size:11px;font-weight:500;
  color:var(--ins-text-highlight);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;
  padding:6px 16px;border:1px solid rgba(7,128,126,.4);background:rgba(7,128,126,.1);border-radius:var(--ins-radius-pill)
}
.section-label::before{content:'✦';font-size:13px;color:var(--ins-color-teal-500)}
.section-title{font-family:var(--ins-font-family-sans);font-size:clamp(36px,4vw,48px);font-weight:500;color:#fff;letter-spacing:-.025em;line-height:1.1;margin-bottom:16px}
.section-sub{font-size:clamp(16px,1.2vw,18px);color:rgba(255,255,255,.8);max-width:42rem;margin-left:auto;margin-right:auto;line-height:1.6}

.orch-flow{display:grid;grid-template-columns:1fr 120px 120px 120px 1fr;align-items:stretch;gap:0;max-width:980px;margin:0 auto}
.orch-sources{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:stretch}
.src-card{
  display:flex;align-items:center;gap:10px;padding:13px 15px;
  background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-lg);
  font-size:13px;font-weight:500;color:var(--ins-text-body);transition:all .2s var(--ins-easing-standard)
}
.src-card:hover{background:var(--ins-color-white-a-12);border-color:var(--ins-border-hover);color:var(--ins-text-heading)}
.src-icon{
  width:30px;height:30px;border-radius:var(--ins-radius-md);background:var(--ins-color-white-a-12);border:1px solid var(--ins-border-hover);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0
}
.orch-conn{display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.orch-conn-line{
  position:absolute;top:50%;left:0;right:0;height:1px;transform:translateY(-50%);
  background:linear-gradient(90deg,transparent,var(--ins-border-brand),transparent);overflow:hidden
}
.orch-conn-line::after{
  content:'';position:absolute;top:-1px;bottom:-1px;width:40%;
  background:linear-gradient(90deg,transparent,rgba(7,200,150,.8),transparent);
  animation:flowRight 2s ease-in-out infinite
}
.orch-conn.right .orch-conn-line::after{animation-delay:1.15s}
@keyframes flowRight{0%{left:-40%}100%{left:140%}}
.orch-mid{display:flex;align-items:center;justify-content:center}
.core-node{
  width:100px;height:100px;border-radius:22px;
  background:linear-gradient(135deg,rgba(7,128,126,.25),rgba(7,128,126,.08));
  border:1px solid rgba(7,128,126,.4);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  backdrop-filter:blur(12px);
  box-shadow:0 0 0 8px rgba(7,128,126,.06),0 0 40px rgba(7,128,126,.2);
  animation:coreGlow 2s ease-in-out 1.15s infinite;flex-shrink:0
}
@keyframes coreGlow{
  0%,40%,100%{box-shadow:0 0 0 8px rgba(7,128,126,.06),0 0 28px rgba(7,128,126,.15)}
  55%,75%{box-shadow:0 0 0 14px rgba(7,128,126,.15),0 0 56px rgba(7,128,126,.4)}
}
.core-lbl{font-family:var(--ins-font-family-sans);font-size:12px;font-weight:500;color:rgba(7,200,180,.9);text-align:center;line-height:1.3;letter-spacing:-.02em}
.core-sub{font-family:var(--ins-font-family-mono);font-size:8.5px;color:var(--ins-text-inactive);letter-spacing:.08em}
.orch-outputs{display:flex;flex-direction:column;gap:10px}
.out-card{
  display:flex;align-items:center;gap:13px;padding:14px 18px;
  background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-lg);
  transition:all .22s var(--ins-easing-standard)
}
.out-card:hover{background:var(--ins-color-white-a-12);border-color:var(--ins-border-hover);transform:translateX(3px)}
.out-icon{
  width:30px;height:30px;border-radius:var(--ins-radius-lg);
  background:rgba(7,128,126,.12);border:1px solid rgba(7,128,126,.25);
  display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0
}
.out-title{font-family:var(--ins-font-family-sans);font-size:13px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.02em}
.out-desc{font-size:11.5px;color:var(--ins-text-body);margin-top:1px}

/* FEATURES */
.feat-header{text-align:center;margin-bottom:64px}

.showcase{
  display:grid;grid-template-columns:380px 1fr;
  border-radius:var(--ins-radius-3xl);overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  box-shadow:0 4px 6px rgba(0,0,0,.5),0 32px 100px rgba(0,0,0,.7);
  min-height:520px;margin:0 auto;position:relative
}
.showcase::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(10,152,150,.6),rgba(255,255,255,.1),rgba(10,152,150,.6),transparent);
  z-index:20;pointer-events:none
}

.sc-steps{order:1}
.sc-preview{
  order:2;position:relative;
  background:radial-gradient(ellipse 100% 80% at 30% 30%,rgba(10,152,150,.06) 0%,transparent 60%),rgba(10,14,19,.95);
  display:flex;align-items:center;justify-content:center;
  padding:24px 20px;overflow:hidden;border-left:1px solid rgba(255,255,255,.05);
  pointer-events:none;user-select:none
}
.sc-panel{
  position:absolute;inset:24px 20px;
  display:flex;align-items:stretch;justify-content:center;
  overflow:hidden;
  opacity:0;pointer-events:none;
  transform:translateY(8px) scale(.99);
  transition:opacity .45s var(--ins-easing-standard),transform .45s var(--ins-easing-standard)
}
.sc-panel.active{opacity:1;pointer-events:none;transform:translateY(0) scale(1)}
.sc-panel .aw{align-self:stretch;display:flex;flex-direction:column;width:100%;height:100%;overflow:hidden}
.sc-panel .aw-body{flex:1;overflow:hidden}

.aw{
  width:100%;background:rgba(10,14,19,.95);
  border:1px solid rgba(255,255,255,.08);border-radius:var(--ins-radius-2xl);
  box-shadow:0 4px 6px rgba(0,0,0,.5),0 16px 48px rgba(0,0,0,.5);
  overflow:hidden
}
.aw-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.05)}
/* p1 needs visible overflow so cursor/modal aren't clipped */
#p1 .aw{overflow:visible;border-radius:var(--ins-radius-2xl)}
#p1 .aw .panel{overflow:hidden;border-radius:0 0 14px 14px}
.aw-dots{display:flex;gap:5px}
.aw-dot{width:9px;height:9px;border-radius:50%}
.aw-dot:nth-child(1){background:#FF5F57}
.aw-dot:nth-child(2){background:#FEBC2E}
.aw-dot:nth-child(3){background:#28C840}
.aw-lbl{font-family:var(--ins-font-family-mono);font-size:10.5px;color:var(--ins-text-inactive);margin-left:2px;letter-spacing:.02em}
.aw-body{padding:14px;display:flex;flex-direction:column;gap:10px}

.sc-steps{display:flex;flex-direction:column;background:rgba(10,14,19,.9);border-right:1px solid rgba(255,255,255,.05);text-align:left}
.sc-step{
  flex:1;padding:0 28px;
  display:flex;flex-direction:column;justify-content:center;
  border-bottom:1px solid var(--ins-border-default);
  cursor:pointer;min-height:80px;
  transition:background .2s var(--ins-easing-standard);position:relative
}
.sc-step:last-child{border-bottom:none}
.sc-step::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:var(--ins-color-teal-500);
  opacity:0;transition:opacity .3s var(--ins-easing-standard)
}
.sc-step.active::before{opacity:1}
.sc-step:hover{background:rgba(255,255,255,.03)}
.sc-step.active{background:rgba(7,128,126,.12);box-shadow:inset 0 0 24px rgba(7,128,126,.08)}
.sc-num{display:none}
.sc-ico{display:none}
.sc-lbl{font-family:var(--ins-font-family-sans);font-size:15px;font-weight:500;color:var(--ins-text-inactive);letter-spacing:-.03em;transition:color .22s,font-weight .22s;line-height:1.2}
.sc-step:hover .sc-lbl{color:var(--ins-text-body)}
.sc-step.active .sc-lbl{color:#fff;font-weight:500;text-shadow:0 0 20px rgba(7,200,180,.2)}
.sc-desc{font-size:12px;color:var(--ins-text-inactive);line-height:1.58;margin-top:6px;max-height:0;overflow:hidden;opacity:0;transition:max-height .4s var(--ins-easing-standard),opacity .4s var(--ins-easing-standard)}
.sc-step.active .sc-desc{max-height:60px;opacity:1;color:var(--ins-text-heading)}
.sc-bar{display:none}
.sc-bar-fill{display:none}

.cs{display:flex;flex-direction:column;gap:9px}
.cs-u{display:flex;justify-content:flex-end}
.bubble-u{
  background:linear-gradient(135deg,rgba(7,128,126,.3),rgba(7,128,126,.15));
  border:1px solid rgba(7,128,126,.3);
  color:var(--ins-text-heading);padding:9px 14px;
  border-radius:var(--ins-radius-2xl) 16px 3px 16px;font-size:12.5px;line-height:1.46;max-width:85%
}
.cs-ai{display:flex;align-items:flex-start;gap:8px}
.ai-badge{
  width:24px;height:24px;flex-shrink:0;
  background:linear-gradient(135deg,var(--ins-text-highlight),var(--ins-color-teal-650));
  border-radius:var(--ins-radius-md);display:flex;align-items:center;justify-content:center;
  font-family:var(--ins-font-family-sans);font-size:8.5px;font-weight:500;color:#fff
}
.typing-wrap{display:flex;align-items:center;gap:3px;padding:10px 14px;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:3px 16px 16px 16px}
.t-dot{width:5px;height:5px;border-radius:50%;background:var(--ins-text-inactive);animation:typBounce 1.1s ease-in-out infinite}
.t-dot:nth-child(2){animation-delay:.18s}
.t-dot:nth-child(3){animation-delay:.36s}
.bubble-ai{background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:3px 16px 16px 16px;padding:10px 14px;font-size:12.5px;color:var(--ins-text-body);line-height:1.55}
.cs-metrics{display:flex;gap:8px;margin-top:9px;flex-wrap:wrap}
.cs-m{padding:6px 11px;background:rgba(255,255,255,.04);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-lg);text-align:center}
.cs-m .v{display:block;font-family:var(--ins-font-family-sans);font-size:13px;font-weight:500;letter-spacing:-.02em}
.cs-m .l{display:block;font-size:9.5px;color:var(--ins-text-inactive);font-family:var(--ins-font-family-mono);margin-top:1px}
.cs-m .neg{color:var(--ins-status-error-fg)}

/* ACCURACY */
#accuracy{padding:100px 0;background:linear-gradient(180deg,var(--ins-surface-card) 0%,var(--ins-surface-container) 100%)}
.acc-hd{text-align:center;margin-bottom:56px}
.acc-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center}
.acc-h2{font-family:var(--ins-font-family-sans);font-size:clamp(28px,3.8vw,44px);font-weight:500;color:var(--ins-text-heading);letter-spacing:-.042em;line-height:1.08;margin-bottom:16px}
.acc-p{font-size:15px;color:var(--ins-text-body);line-height:1.65;margin-bottom:24px}
.acc-list{list-style:none;display:flex;flex-direction:column;gap:12px}
.acc-list li{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--ins-text-body);line-height:1.5}
.chk{
  width:18px;height:18px;border-radius:50%;
  background:linear-gradient(135deg,var(--ins-text-highlight),var(--ins-color-teal-500));
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
  box-shadow:0 0 8px rgba(7,128,126,.4)
}
.mdc{
  background:rgba(13,17,23,.95);border:1px solid rgba(255,255,255,.08);
  border-radius:var(--ins-radius-xl);padding:24px;position:relative;
  box-shadow:0 0 0 1px rgba(10,152,150,.15),0 16px 48px rgba(0,0,0,.4)
}
.mdc::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:var(--ins-radius-xl) var(--ins-radius-xl) 0 0;background:linear-gradient(90deg,transparent,rgba(10,152,150,.6),transparent)}
.mdc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mdc-title{font-family:var(--ins-font-family-sans);font-size:15px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.025em}
.cert-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;background:rgba(7,128,126,.15);border:1px solid rgba(7,128,126,.35);border-radius:var(--ins-radius-md);font-size:10.5px;font-weight:500;color:rgba(7,200,180,.9);font-family:var(--ins-font-family-mono)}
.mdc-fl{font-family:var(--ins-font-family-mono);font-size:9.5px;color:var(--ins-text-inactive);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.mdc-formula{font-family:var(--ins-font-family-mono);font-size:12px;color:rgba(7,200,180,.8);background:rgba(7,128,126,.1);border:1px solid rgba(7,128,126,.2);padding:8px 12px;border-radius:var(--ins-radius-md);margin-bottom:14px}
.mdc-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.mdc-mv{font-size:13px;font-weight:500;color:var(--ins-text-heading)}
.mdc-div{height:1px;background:var(--ins-border-default);margin-bottom:12px}
.mdc-usage{font-size:12.5px;color:var(--ins-text-body)}

/* TESTIMONIALS */
#testimonials{padding:100px 0;background:linear-gradient(180deg,var(--ins-surface-container) 0%,var(--ins-surface-card) 100%)}
.testi-hd{text-align:center;margin-bottom:48px}
.testi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.testi-card{
  background:rgba(13,17,23,.8);border:1px solid rgba(255,255,255,.06);
  border-radius:var(--ins-radius-xl);padding:28px;position:relative;
  transition:all .25s var(--ins-easing-standard)
}
.testi-card:hover{background:rgba(22,32,40,.9);border-color:rgba(255,255,255,.1);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.testi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:var(--ins-radius-xl) var(--ins-radius-xl) 0 0;background:linear-gradient(90deg,transparent,rgba(10,152,150,.3),transparent)}
.testi-stars{color:var(--ins-text-highlight);font-size:12px;letter-spacing:3px;margin-bottom:12px;opacity:.8}
.testi-q{font-size:14px;color:var(--ins-text-body);line-height:1.68;margin-bottom:20px;font-style:italic}
.testi-author{display:flex;align-items:center;gap:10px}
.testi-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--ins-text-highlight),var(--ins-color-teal-650));display:flex;align-items:center;justify-content:center;font-family:var(--ins-font-family-sans);font-size:11px;font-weight:500;color:#fff;flex-shrink:0;box-shadow:0 0 12px rgba(7,128,126,.4)}
.testi-name{font-size:13px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.018em}
.testi-role{font-size:11.5px;color:var(--ins-text-inactive);margin-top:1px}

/* TOKEN */
#token{padding:100px 0;text-align:center;position:relative;overflow:hidden;background:linear-gradient(180deg,var(--ins-surface-card) 0%,var(--ins-surface-container) 100%)}
#token::before{content:'';position:absolute;width:700px;height:400px;background:radial-gradient(ellipse,rgba(7,128,126,.1) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);filter:blur(60px);pointer-events:none}
.tok-icon{width:52px;height:52px;border-radius:var(--ins-radius-2xl);background:rgba(7,128,126,.12);border:1px solid rgba(7,128,126,.3);box-shadow:0 0 0 6px rgba(7,128,126,.06),0 0 32px rgba(7,128,126,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 28px;position:relative;z-index:1}
.tok-h2{font-family:var(--ins-font-family-sans);font-size:clamp(28px,4vw,46px);font-weight:500;color:var(--ins-text-heading);letter-spacing:-.044em;line-height:1.08;margin-bottom:14px;position:relative;z-index:1}
.tok-sub{font-size:15px;color:var(--ins-text-body);max-width:480px;margin:0 auto 40px;line-height:1.62;position:relative;z-index:1}
.tok-cmp{display:flex;gap:14px;max-width:620px;margin:0 auto 36px;position:relative;z-index:1}
.tok-bad,.tok-good{flex:1;padding:26px;border-radius:var(--ins-radius-xl);text-align:left;position:relative;backdrop-filter:blur(12px)}
.tok-bad{background:rgba(248,113,113,.04);border:1px solid rgba(248,113,113,.15)}
.tok-bad::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:var(--ins-radius-xl) var(--ins-radius-xl) 0 0;background:linear-gradient(90deg,transparent,rgba(248,113,113,.2),transparent)}
.tok-good{background:rgba(7,128,126,.08);border:1px solid rgba(7,128,126,.3);box-shadow:var(--ins-shadow-glow-brand)}
.tok-good::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;border-radius:var(--ins-radius-xl) var(--ins-radius-xl) 0 0;background:linear-gradient(90deg,transparent,rgba(7,128,126,.5),transparent)}
.tc-ico{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;font-size:13px;font-weight:500}
.tc-ico.bad{background:rgba(248,113,113,.1);color:var(--ins-status-error-fg)}
.tc-ico.good{background:rgba(7,128,126,.15);color:var(--ins-text-highlight)}
.tc-title{font-family:var(--ins-font-family-sans);font-size:15px;font-weight:500;color:var(--ins-text-heading);margin-bottom:14px;letter-spacing:-.026em}
.tc-pts{list-style:none;display:flex;flex-direction:column;gap:9px}
.tc-pts li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--ins-text-body)}
.tc-mk{flex-shrink:0;font-weight:500}
.tc-mk.bad{color:var(--ins-status-error-fg)}
.tc-mk.good{color:var(--ins-text-highlight)}
.btn-outline{
  display:inline-flex;align-items:center;gap:6px;
  padding:11px 26px;font-size:13.5px;font-weight:500;
  color:var(--ins-text-heading);background:rgba(255,255,255,.05);
  border:1px solid var(--ins-border-hover);border-radius:var(--ins-radius-pill);
  cursor:pointer;text-decoration:none;
  position:relative;z-index:1;transition:all .2s var(--ins-easing-standard);backdrop-filter:blur(8px)
}
.btn-outline:hover{border-color:rgba(7,128,126,.5);color:rgba(7,200,180,.9);box-shadow:0 0 20px rgba(7,128,126,.2)}

/* FOOTER */
footer{background:rgba(8,11,15,.98);border-top:1px solid rgba(255,255,255,.05);color:var(--ins-text-body);position:relative;overflow:hidden}
footer::before{content:'';position:absolute;width:500px;height:300px;background:radial-gradient(ellipse,rgba(7,128,126,.08) 0%,transparent 70%);top:-80px;right:10%;filter:blur(60px);pointer-events:none}
.ft-dv-title{font-family:var(--ins-font-family-sans);font-size:16px;font-weight:500;color:var(--ins-text-heading);margin-bottom:6px;letter-spacing:-.026em}
.ft-dv-sub{font-size:13px;color:var(--ins-text-inactive);max-width:380px;line-height:1.62;margin-bottom:14px}
.dv-badge{display:inline-flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(7,128,126,.08);border:1px solid rgba(7,128,126,.25);border-radius:var(--ins-radius-lg);font-size:11px;font-weight:500;color:rgba(7,200,180,.7);letter-spacing:.08em;font-family:var(--ins-font-family-mono)}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;padding:52px 0 40px;position:relative;z-index:1}
.ft-logo-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ft-logo-ico{display:flex;align-items:center;justify-content:center}
.ft-logo-name{font-family:var(--ins-font-family-sans);font-size:16px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.026em}
.ft-tagline{font-size:12px;color:var(--ins-text-inactive);line-height:1.5}
.ft-col h4{font-size:10px;font-weight:500;color:var(--ins-text-inactive);letter-spacing:.12em;text-transform:uppercase;margin-bottom:14px;font-family:var(--ins-font-family-mono)}
.ft-col ul{list-style:none;display:flex;flex-direction:column;gap:9px}
.ft-col a{font-size:13px;color:var(--ins-text-inactive);text-decoration:none;transition:color .15s}
.ft-col a:hover{color:var(--ins-text-heading)}
.ft-bottom{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-top:1px solid var(--ins-border-default);font-size:10.5px;color:var(--ins-text-disabled);font-family:var(--ins-font-family-mono);position:relative;z-index:1}
.ft-social{display:flex;gap:16px}
.ft-social a{font-size:10.5px;color:var(--ins-text-disabled);text-decoration:none;transition:color .15s}
.ft-social a:hover{color:var(--ins-text-body)}

/* KEYFRAMES */
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes typBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideInL{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes syncBar{0%{width:0%}70%{width:72%}85%{width:72%}100%{width:0%}}
@keyframes stripeOn{0%,100%{opacity:0}15%,60%{opacity:1}80%{opacity:0}}
@keyframes mc1{0%,30%{background:var(--ins-status-warning-fg)}55%,100%{background:var(--ins-status-success-fg);box-shadow:0 0 6px rgba(34,197,94,.5)}}
@keyframes mc2{0%,40%{background:var(--ins-status-warning-fg)}65%,100%{background:var(--ins-status-success-fg);box-shadow:0 0 6px rgba(34,197,94,.5)}}
@keyframes bc1{
  0%,30%{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--ins-status-warning-fg)}
  55%,100%{background:rgba(7,128,126,.15);border-color:rgba(7,128,126,.35);color:rgba(7,200,180,.9)}
}
@keyframes bc2{
  0%,40%{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--ins-status-warning-fg)}
  65%,100%{background:rgba(7,128,126,.15);border-color:rgba(7,128,126,.35);color:rgba(7,200,180,.9)}
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 16px rgba(7,128,126,.3);transform:scale(1)}
  40%{box-shadow:0 0 0 8px rgba(7,128,126,.12)}
  55%{transform:scale(.94)}65%{transform:scale(1)}
}
@keyframes pgGreen{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

@media(max-width:900px){
  nav,.logos-bar{padding-left:20px;padding-right:20px}
  .container{padding:0 20px}
  .nav-links{display:none}
  .orch-flow{grid-template-columns:1fr;gap:16px}
  .orch-conn{display:none}
  .showcase{grid-template-columns:1fr}
  .sc-steps{order:2;border-right:none;border-top:1px solid rgba(255,255,255,.05)}
  .sc-preview{order:1;border-left:none;min-height:400px}
  .acc-grid,.testi-grid,.tok-cmp{grid-template-columns:1fr}
  .ft-grid{grid-template-columns:1fr 1fr;padding:32px 0}
}
#p0cursor{
  position:absolute;width:18px;height:18px;pointer-events:none;z-index:999;
  transition:left .45s cubic-bezier(.4,0,.2,1),top .45s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 2px 6px rgba(0,0,0,.7));display:none
}
#p0cursor.clicking{animation:cursorClick .22s ease}
@keyframes cursorClick{0%{transform:scale(1)}40%{transform:scale(.72)}100%{transform:scale(1)}}
.p0-focus{border-color:rgba(10,152,150,.55)!important;box-shadow:0 0 0 2px rgba(10,152,150,.15)!important}
#p1cursor{
  position:absolute;width:16px;height:16px;pointer-events:none;z-index:999;
  transition:left .4s cubic-bezier(.4,0,.2,1),top .4s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));display:none
}
#p1cursor.clicking{animation:cursorClick .2s ease}

/* ── P1 METRICS PANEL ── */
/* ── MAIN PANEL ── */
.panel{padding:20px 20px 16px;position:relative}

/* ── HEADER ── */
.catalog-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;
}
.catalog-title{font-size:18px;font-weight:500;color:var(--ins-text-heading);letter-spacing:-.03em}
.btn-new{
  display:flex;align-items:center;gap:6px;
  background:var(--ins-color-teal-500);color:#fff;
  border:none;border-radius:20px;padding:7px 14px;
  font-size:11.5px;font-weight:500;font-family:var(--ins-font-family-sans);cursor:pointer;
  transition:background .2s;
}
.btn-new:hover{background:var(--ins-text-highlight)}
.btn-new svg{flex-shrink:0}

/* ── SEARCH + FILTERS ── */
.search-row{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.search-box{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);
  border-radius:var(--ins-radius-lg);padding:8px 12px;
}
.search-box input{
  background:none;border:none;outline:none;
  color:var(--ins-text-body);font-size:12px;font-family:var(--ins-font-family-sans);width:100%;
}
.search-box input::placeholder{color:var(--ins-text-inactive)}
.filter-btn{
  width:34px;height:34px;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);
  border-radius:var(--ins-radius-lg);display:flex;align-items:center;justify-content:center;cursor:pointer;
  flex-shrink:0;
}

/* ── CATEGORY PILLS ── */
.cat-row{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;
}
.cats{display:flex;gap:6px}
.cat{
  padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;
  border:1px solid var(--ins-border-default);color:var(--ins-text-inactive);cursor:pointer;transition:all .15s;
}
.cat.active{background:var(--ins-color-teal-500);color:#fff;border-color:var(--ins-color-teal-500)}
.cat span{color:var(--ins-text-inactive);font-size:10px;margin-left:3px}
.cat.active span{color:rgba(255,255,255,.7)}
.hide-toggle{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--ins-text-inactive)}
.toggle-sw{
  width:28px;height:16px;background:var(--ins-color-white-a-12);border-radius:var(--ins-radius-lg);
  position:relative;border:1px solid var(--ins-border-default);cursor:pointer;
}
.toggle-sw::after{
  content:'';position:absolute;left:2px;top:2px;
  width:10px;height:10px;border-radius:50%;background:var(--ins-text-inactive);transition:all .2s;
}

/* ── TABLE ── */
.metrics-table{width:100%}
.table-head{
  display:grid;
  grid-template-columns:38px 1fr 110px 110px 34px;
  gap:0;padding:6px 8px;
  border-bottom:1px solid var(--ins-border-default);margin-bottom:2px;
}
.th{font-size:10px;color:var(--ins-text-inactive);font-weight:500;display:flex;align-items:center;gap:3px}
.metric-row > div:nth-child(3),.table-head > .th:nth-child(3){padding-left:16px}

/* ── SECTION GROUP ── */
.group-header{
  display:flex;align-items:center;gap:8px;
  padding:8px 8px 6px;
  font-size:11px;color:var(--ins-text-body);font-weight:500;
}
.group-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--ins-status-success-fg);box-shadow:0 0 6px rgba(34,197,94,.5);
}
.group-dot.draft{background:var(--ins-text-inactive);box-shadow:none}

/* ── METRIC ROW ── */
.metric-row{
  display:grid;
  grid-template-columns:38px 1fr 110px 110px 34px;
  align-items:center;gap:0;
  padding:9px 8px;
  border-radius:var(--ins-radius-md);
  transition:background .15s;
  position:relative;cursor:default;
}
.metric-row:hover{background:var(--ins-color-white-a-06)}
.metric-row.highlighted{background:rgba(10,152,150,.06);border:1px solid rgba(10,152,150,.15)}
.metric-row.flash-success{
  animation:rowFlash .6s ease forwards;
}
@keyframes rowFlash{
  0%{background:rgba(34,197,94,.15)}
  100%{background:rgba(34,197,94,.04)}
}

/* toggle */
.tog{
  width:28px;height:16px;border-radius:var(--ins-radius-lg);
  position:relative;cursor:pointer;transition:background .25s;
  flex-shrink:0;
  border:none;outline:none;
}
.tog.on{background:var(--ins-color-teal-500)}
.tog.off{background:rgba(255,255,255,.12)}
.tog::after{
  content:'';position:absolute;
  top:2px;width:12px;height:12px;border-radius:50%;
  background:#fff;transition:left .25s cubic-bezier(.4,0,.2,1);
  box-shadow:0 1px 3px rgba(0,0,0,.3);
}
.tog.on::after{left:14px}
.tog.off::after{left:2px}

.metric-name{font-size:12px;font-weight:500;color:var(--ins-text-heading)}
.metric-name.draft{color:var(--ins-text-body)}
.short-name{
  font-family:var(--ins-font-family-mono);font-size:10px;color:var(--ins-text-highlight);
  background:rgba(10,152,150,.1);border-radius:var(--ins-radius-sm);
  padding:2px 6px;white-space:nowrap;
}
.draft .short-name{color:var(--ins-text-inactive);background:rgba(255,255,255,.05)}
.desc{font-size:11px;color:var(--ins-text-inactive);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.badge{
  display:inline-flex;align-items:center;
  padding:2px 8px;border-radius:var(--ins-radius-sm);font-size:10px;font-weight:500;
}
.badge.marketing{color:var(--ins-color-teal-400);background:rgba(10,152,150,.12)}
.badge.revops{color:#60A5FA;background:rgba(96,165,250,.1)}
.badge.finance{color:#A78BFA;background:rgba(167,139,250,.1)}
.metric-row > div:nth-child(4),.table-head > .th:nth-child(4){display:none}

.source-cell{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ins-text-body)}
.src-icon{width:16px;height:16px;border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px}

.more-btn{
  width:26px;height:26px;border-radius:5px;
  background:none;border:1px solid transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .15s;color:var(--ins-text-inactive);
}
.more-btn:hover{background:var(--ins-color-white-a-12);border-color:var(--ins-border-default);color:var(--ins-text-heading)}
.more-btn.active{background:var(--ins-color-white-a-12);border-color:var(--ins-border-hover);color:var(--ins-text-heading)}

.draft-badge{display:none!important;
  font-size:9px;font-weight:500;
  padding:1px 6px;border-radius:3px;
  color:var(--ins-status-warning-fg);background:rgba(245,158,11,.1);
  border:1px solid rgba(245,158,11,.2);
  margin-left:6px;
}

/* ── CONTEXT MENU ── */
.ctx-menu{
  position:absolute;
  background:var(--ins-color-gray-800);border:1px solid rgba(255,255,255,.12);
  border-radius:9px;box-shadow:0 12px 36px rgba(0,0,0,.6);
  padding:5px;min-width:148px;z-index:100;
  opacity:0;transform:scale(.92) translateY(-4px);
  transition:opacity .18s,transform .18s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
.ctx-menu.show{opacity:1;transform:scale(1) translateY(0);pointer-events:auto}
.ctx-item{
  display:flex;align-items:center;gap:9px;padding:8px 10px;
  border-radius:var(--ins-radius-md);font-size:12px;color:var(--ins-text-heading);cursor:pointer;
  transition:background .12s;
}
.ctx-item:hover{background:rgba(255,255,255,.06)}
.ctx-item.danger{color:var(--ins-status-error-fg)}
.ctx-item svg{opacity:.6;flex-shrink:0}
.ctx-item.danger svg{opacity:.8}
.ctx-sep{height:1px;background:var(--ins-border-default);margin:4px 0}

/* ── EDIT MODAL ── */
.modal-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,.55);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  z-index:200;opacity:0;pointer-events:none;
  transition:opacity .3s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}

.modal{
  width:min(560px,92%);
  background:var(--ins-color-gray-800);border:1px solid rgba(255,255,255,.1);
  border-radius:var(--ins-radius-2xl);padding:20px;
  box-shadow:0 24px 64px rgba(0,0,0,.8);
  transform:scale(.95) translateY(8px);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
}
.modal-overlay.show .modal{transform:scale(1) translateY(0)}

.modal-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
}
.modal-title{font-size:15px;font-weight:500;color:var(--ins-text-heading)}
.close-btn{
  width:24px;height:24px;border-radius:var(--ins-radius-md);background:none;border:none;
  color:var(--ins-text-inactive);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.close-btn:hover{background:var(--ins-color-white-a-12);color:var(--ins-text-heading)}

.field-group{margin-bottom:12px}
.field-label{font-size:10.5px;color:var(--ins-text-body);margin-bottom:5px;font-weight:500}
.field-label span{color:var(--ins-text-inactive);font-weight:400}
.field-input{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);
  padding:8px 10px;font-size:12px;color:var(--ins-text-heading);
  font-family:var(--ins-font-family-sans);outline:none;transition:border .2s,box-shadow .2s;
}
.field-input:focus,.field-input.focused{
  border-color:rgba(10,152,150,.5);
  box-shadow:0 0 0 2px rgba(10,152,150,.12);
}
.field-input.filled{color:var(--ins-text-heading)}
.field-textarea{
  height:58px;resize:none;line-height:1.5;
}

.select-field{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);
  padding:8px 10px;font-size:12px;color:var(--ins-text-heading);
  font-family:var(--ins-font-family-sans);outline:none;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;
  transition:border .2s;
}
.select-field.selected{border-color:rgba(10,152,150,.3)}

.ds-grid{
  background:rgba(255,255,255,.03);border:1px solid var(--ins-border-default);
  border-radius:var(--ins-radius-lg);padding:10px;
  display:grid;gap:8px;
}
.ds-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ds-col{display:flex;flex-direction:column;gap:4px;position:relative}
.ds-col-label{font-size:9.5px;color:var(--ins-text-inactive);font-weight:500}
.ds-sel{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);
  padding:7px 10px;font-size:11.5px;color:var(--ins-text-body);
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all .2s;user-select:none;
}
.ds-sel:hover{border-color:var(--ins-border-hover);background:rgba(255,255,255,.07)}
.ds-sel.filled{color:var(--ins-text-heading);border-color:rgba(10,152,150,.3)}
.ds-sel.open{border-color:rgba(10,152,150,.5);box-shadow:0 0 0 2px rgba(10,152,150,.12)}
.arrow-icon{color:var(--ins-text-inactive);opacity:.5;flex-shrink:0;margin:0 4px}
.ds-dropdown{
  position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:500;
  background:var(--ins-color-gray-800);border:1px solid rgba(255,255,255,.12);
  border-radius:var(--ins-radius-lg);padding:4px;
  box-shadow:0 12px 32px rgba(0,0,0,.6);
  opacity:0;transform:translateY(-6px) scale(.97);
  transition:opacity .15s,transform .15s cubic-bezier(.34,1.2,.64,1);
  pointer-events:none;
}
.ds-dropdown.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto}
.dd-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;border-radius:5px;
  font-size:11.5px;color:var(--ins-text-body);cursor:pointer;
  transition:background .1s,color .1s;
}
.dd-item:hover{background:rgba(255,255,255,.06);color:var(--ins-text-heading)}
.dd-item.selected{color:var(--ins-text-highlight);background:rgba(10,152,150,.08)}
.dd-item-icon{width:18px;height:18px;border-radius:var(--ins-radius-sm);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500}

.add-filter{
  display:flex;align-items:center;gap:6px;margin-top:8px;
  font-size:11px;color:var(--ins-text-highlight);cursor:pointer;padding:5px 2px;
  border:none;background:none;font-family:var(--ins-font-family-sans);transition:opacity .15s;
}
.add-filter:hover{opacity:.8}

.modal-hint{font-size:10px;color:var(--ins-text-inactive);margin-top:8px;line-height:1.4}

.modal-actions{
  display:flex;align-items:center;justify-content:flex-end;gap:8px;margin-top:16px;
}
.btn-cancel{
  padding:7px 14px;border-radius:20px;
  background:none;border:1px solid var(--ins-border-hover);
  color:var(--ins-text-body);font-size:12px;font-family:var(--ins-font-family-sans);
  cursor:pointer;transition:all .15s;
}
.btn-cancel:hover{border-color:var(--ins-border-hover);color:var(--ins-text-heading)}
.btn-save{
  padding:7px 16px;border-radius:20px;
  background:var(--ins-color-teal-500);border:none;
  color:#fff;font-size:12px;font-weight:500;font-family:var(--ins-font-family-sans);
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.btn-save:hover{background:var(--ins-text-highlight)}
.btn-save.loading{pointer-events:none;opacity:.8}
.btn-save .spinner{
  display:none;width:12px;height:12px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spinModal .6s linear infinite;
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
}
.btn-save.loading .spinner{display:block}
.btn-save.loading .save-lbl{margin-right:14px}
@keyframes spinModal{0%{transform:translateY(-50%) rotate(0deg)}to{transform:translateY(-50%) rotate(360deg)}}

/* ── SUCCESS TOAST ── */
.success-toast{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#1A2F22;border:1px solid rgba(34,197,94,.3);
  border-radius:10px;padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  font-size:12px;color:var(--ins-text-heading);
  box-shadow:0 8px 24px rgba(0,0,0,.5);
  opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;z-index:300;
}
.success-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-icon{
  width:20px;height:20px;border-radius:50%;
  background:rgba(34,197,94,.2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── CURSOR ── */
#cursor{
  position:absolute;pointer-events:none;z-index:999;
  width:16px;height:16px;display:none;
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));
  transition:left .4s cubic-bezier(.4,0,.2,1),top .4s cubic-bezier(.4,0,.2,1);
}
#cursor.clicking{animation:cursorClick .2s ease}
@keyframes cursorClick{0%{transform:scale(1)}40%{transform:scale(.68)}100%{transform:scale(1)}}

/* ── P2 CHAT PANEL ── */
#p2 .aw{overflow:visible}
.p2-body{
  flex:1;overflow:hidden;
  position:relative;
}
.p2-scene{
  position:absolute;inset:0;
  display:flex;flex-direction:column;justify-content:flex-end;
  padding:12px 14px 8px;gap:9px;
  width:100%;
}
.p2-typing{display:flex;align-items:center;gap:3px;padding:8px 12px;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:3px 14px 14px 14px}
.p2-qs{display:flex;flex-direction:column;gap:5px;margin-top:8px}
.p2-q{font-size:11.5px;color:var(--ins-text-body);padding:5px 8px;background:rgba(255,255,255,.04);border-radius:var(--ins-radius-md);border:1px solid var(--ins-border-default)}
.p2-hint{color:var(--ins-text-highlight);font-style:italic}
.p2-chart-bubble{padding:11px 13px!important}
.p2-chart{
  background:rgba(0,0,0,.25);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-lg);
  padding:10px 12px 8px;margin-bottom:10px;
}
.p2-chart-title{font-size:10px;color:var(--ins-text-inactive);margin-bottom:8px;font-family:var(--ins-font-family-mono)}
.p2-bars{display:flex;gap:6px;align-items:flex-end;height:60px}
.p2-bar-group{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.p2-bar-wrap{display:flex;gap:2px;align-items:flex-end;height:52px}
.p2-bar{
  width:10px;border-radius:2px 2px 0 0;
  height:calc(var(--h));
  transform:scaleY(0);transform-origin:bottom;
  transition:transform .6s cubic-bezier(.4,0,.2,1);
}
.p2-bar.grow{transform:scaleY(1)}
.p2-bar-lbl{font-size:9px;color:var(--ins-text-inactive);font-family:var(--ins-font-family-mono)}
.p2-legend{display:flex;gap:10px;margin-top:6px}
.p2-leg{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--ins-text-inactive)}
.p2-leg span{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.p2-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px}
.p2-card{background:rgba(255,255,255,.04);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);padding:5px 7px}
.p2-card-lbl{font-size:9px;color:var(--ins-text-inactive);font-family:var(--ins-font-family-mono);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p2-card-val{font-size:11px;font-weight:500;font-family:var(--ins-font-family-mono);white-space:nowrap}
.p2-linechart{width:100%;height:70px;display:block;margin-bottom:6px}
.p2-line{stroke-dasharray:600;stroke-dashoffset:600;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.p2-line.draw{stroke-dashoffset:0}
.p2-save-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 13px;border-radius:var(--ins-radius-md);
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
  font-size:11px;color:var(--ins-text-body);cursor:pointer;
  transition:background .2s,border-color .2s,color .2s;
}
.p2-save-btn:hover,.p2-save-btn.hovered{
  background:rgba(10,152,150,.15);border-color:rgba(10,152,150,.4);color:var(--ins-text-highlight);
}
.p2-input-bar{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;border-top:1px solid var(--ins-border-default);flex-shrink:0;
}
.p2-input{
  flex:1;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-lg);
  padding:7px 11px;font-size:11.5px;color:var(--ins-text-heading);min-height:30px;
  display:flex;align-items:center;font-family:var(--ins-font-family-sans);
}
.p2-caret{
  display:inline-block;width:1.5px;height:12px;
  background:var(--ins-text-highlight);margin-left:1px;
  animation:caretBlink .9s step-end infinite;
  vertical-align:middle;
}
@keyframes caretBlink{0%,100%{opacity:1}50%{opacity:0}}
.p2-send{
  width:30px;height:30px;border-radius:50%;
  background:var(--ins-color-teal-500);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.p2-token-bubble{
  font-family:var(--ins-font-family-mono);font-size:11px;font-weight:500;
  color:var(--ins-text-highlight);background:rgba(10,152,150,.2);
  border-radius:var(--ins-radius-sm);padding:1px 6px;margin-right:3px;
}
.p2-token{
  font-family:var(--ins-font-family-mono);font-size:11px;font-weight:500;
  color:var(--ins-text-highlight);background:rgba(10,152,150,.15);
  border-radius:var(--ins-radius-sm);padding:1px 5px;margin:0 2px;
}
#p2cursor{
  position:absolute;width:16px;height:16px;pointer-events:none;z-index:999;
  transition:left .4s cubic-bezier(.4,0,.2,1),top .4s cubic-bezier(.4,0,.2,1);
  filter:drop-shadow(0 2px 5px rgba(0,0,0,.7));display:none;
}
#p2cursor.clicking{animation:cursorClick .2s ease}

/* ── Panel 3 ── */
.p3-screen{display:none;flex-direction:column;overflow:hidden;flex:1;min-height:0}
#p3aw{overflow:hidden}
.p3-chat-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;gap:8px;overflow:hidden}

/* Reports list */
.p3-reports-header{padding:10px 12px 6px;border-bottom:1px solid var(--ins-border-default);flex-shrink:0}
.p3-reports-title{font-family:var(--ins-font-family-sans);font-size:15px;font-weight:500;color:var(--ins-text-heading);margin-bottom:6px}
.p3-search{display:flex;align-items:center;gap:6px;padding:5px 9px;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);margin-bottom:5px}
.p3-reports-meta{font-size:10px;color:var(--ins-text-inactive)}
.p3-report-list{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:0}
.p3-report-row{display:grid;grid-template-columns:1fr 70px;align-items:center;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s}
.p3-report-row:hover{background:rgba(255,255,255,.03)}
.p3-new-report{background:rgba(10,152,150,.06);border-left:2px solid var(--ins-color-teal-500) !important}
.p3-new-report .p3-report-name{color:var(--ins-text-highlight) !important;font-weight:500}
.p3-report-info{min-width:0}
.p3-report-name{font-size:11.5px;font-weight:500;color:var(--ins-text-heading);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.p3-report-desc{font-size:10px;color:var(--ins-text-inactive);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p3-report-meta{display:flex;align-items:center;justify-content:flex-start;gap:5px;width:70px}
.p3-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--ins-text-highlight),var(--ins-color-teal-650));display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:500;color:#fff;flex-shrink:0}
.p3-report-meta span{white-space:nowrap;flex-shrink:0}

/* Report detail view */
.p3-report-view{flex:1;display:flex;flex-direction:column;gap:0;overflow-y:auto;overflow-x:hidden}
.p3-rv-header{display:flex;align-items:flex-start;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid var(--ins-border-default);flex-shrink:0}
.p3-rv-title{font-family:var(--ins-font-family-sans);font-size:13px;font-weight:500;color:var(--ins-text-heading);margin-bottom:3px}
.p3-rv-meta{font-size:10px;color:var(--ins-text-inactive)}
.p3-rv-actions{display:flex;gap:5px}
.p3-rv-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);font-size:10.5px;color:var(--ins-text-body);cursor:pointer;transition:all .15s}
.p3-rv-btn:hover,.p3-rv-btn.hovered{background:var(--ins-color-white-a-12);border-color:var(--ins-border-hover);color:var(--ins-text-heading)}
.p3-metric-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:8px 12px;flex-shrink:0}
.p3-mc{background:var(--ins-color-white-a-06);border:1px solid var(--ins-border-default);border-radius:var(--ins-radius-md);padding:6px 8px}
.p3-mc-lbl{font-size:9px;color:var(--ins-text-inactive);font-family:var(--ins-font-family-mono);margin-bottom:2px}
.p3-mc-val{font-size:13px;font-weight:500;color:var(--ins-text-heading);font-family:var(--ins-font-family-sans)}
.p3-mc-val.red{color:var(--ins-status-error-fg)}
.p3-mc-val.green{color:var(--ins-status-success-fg)}
.p3-mc-delta{font-size:9px;margin-top:1px;font-family:var(--ins-font-family-mono)}
.p3-mc-delta.red{color:var(--ins-status-error-fg)}
.p3-mc-delta.green{color:var(--ins-status-success-fg)}
.p3-mc-delta.neutral{color:var(--ins-text-inactive)}
.p3-chart-box{padding:0 12px 6px;flex-shrink:0}
.p3-legend-row{display:flex;gap:10px;margin-top:5px}
.p3-takeaways{margin:0 10px 8px;padding:8px 10px;background:rgba(10,152,150,.06);border:1px solid rgba(10,152,150,.15);border-radius:var(--ins-radius-lg);flex-shrink:0}
.p3-tk-header{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:500;color:var(--ins-text-highlight);margin-bottom:6px}
.p3-tk-row{font-size:10px;color:var(--ins-text-body);line-height:1.5;margin-bottom:4px}
.p3-tk-row:last-child{margin-bottom:0}

/* Share modal */
.p3-modal-overlay{position:absolute;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:100;border-radius:var(--ins-radius-xl)}
.p3-modal{background:var(--ins-color-gray-800);border:1px solid rgba(255,255,255,.1);border-radius:var(--ins-radius-2xl);width:88%;padding:18px 16px 14px;display:flex;flex-direction:column;gap:13px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.p3-modal-title{font-size:14px;font-weight:500;color:var(--ins-text-heading);font-family:var(--ins-font-family-sans)}
.p3-modal-header{display:flex;align-items:center;justify-content:space-between}
.p3-modal-close{background:none;border:none;color:var(--ins-text-inactive);font-size:14px;cursor:pointer;padding:0;line-height:1}
.p3-modal-field{display:flex;flex-direction:column;gap:5px}
.p3-field-lbl{font-size:11px;font-weight:500;color:var(--ins-text-heading)}
.p3-field-input{padding:7px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--ins-radius-lg);display:flex;flex-direction:column;gap:5px}
.p3-tag-row{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.p3-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:5px;font-size:10.5px;color:var(--ins-text-heading)}
.p3-tag-typing{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);min-width:30px}
.p3-tag-x{color:var(--ins-text-inactive);font-size:11px}
.p3-tag-x-hide{opacity:0}
.p3-add-recipient{font-size:10.5px;color:var(--ins-text-inactive);margin-top:1px}
.p3-typed-email{font-size:10.5px;color:var(--ins-text-heading)}
.p3-field-val{padding:8px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:var(--ins-radius-lg);font-size:10.5px;color:var(--ins-text-body);line-height:1.55}

<div id="root"><div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0A0E13"><div style="width:40px;height:40px;border:3px solid rgba(7,128,126,0.2);border-top-color:var(--ins-color-teal-400);border-radius:50%;animation:spin 1s linear infinite"></div></div></div>
<script>
/* ── Showcase global vars + goToStep (click-only, no auto-rotate) ── */
const TOTAL=5;
var cur=0, showcaseStarted=false;

function stopAllDemos(){
  if(typeof p0stopDemo==='function') p0stopDemo();
  if(typeof p1_chain!=='undefined') p1_chain.forEach(id=>clearTimeout(id));
  if(typeof p2_chain!=='undefined') p2_chain.forEach(id=>clearTimeout(id));
  if(typeof p3_chain!=='undefined') p3_chain.forEach(clearTimeout);
  if(typeof p4_chain!=='undefined') p4_chain.forEach(clearTimeout);
}
function goToStep(n){
  stopAllDemos();
  document.querySelectorAll('.sc-step').forEach((el,i)=>{
    el.classList.toggle('active',i===n);
  });
  document.querySelectorAll('.sc-panel').forEach((p,i)=>{
    p.classList.remove('active');
    if(i===n){
      // p0 has interactive sub-screens — never clone it, just activate
      if(i===0){
        if(typeof p1_chain!=='undefined') p1_chain.forEach(id=>clearTimeout(id));
        p0stopDemo();
        p0reset(); // synchronous reset before panel visible
        requestAnimationFrame(()=>{ p.classList.add('active'); });
        if(typeof p0startDemo==='function') setTimeout(p0startDemo, 300);
      } else if(i===1){
        p0stopDemo();
        // reset p1 cursor instantly
        const _p1cur=document.getElementById('p1cursor');if(_p1cur)_p1cur.style.display='none';
        requestAnimationFrame(()=>p.classList.add('active'));
        if(typeof p1Init==='function') setTimeout(p1Init, 100);
      } else if(i===2){
        p2_chain.forEach(id=>clearTimeout(id));
        // reset p2 state instantly before panel becomes visible
        document.getElementById('p2chat').innerHTML='';
        document.getElementById('p2typed').textContent='';
        document.getElementById('p2token').style.display='none';
        document.getElementById('p2cursor').style.display='none';
        requestAnimationFrame(()=>p.classList.add('active'));
        if(typeof p2Init==='function') setTimeout(p2Init,100);
      } else if(i===3){
        if(typeof p3_chain!=='undefined') p3_chain.forEach(id=>clearTimeout(id));
        // reset p3 state instantly before panel becomes visible
        const _sA=document.getElementById('p3screenA'),_sB=document.getElementById('p3screenB'),_sC=document.getElementById('p3screenC'),_mo=document.getElementById('p3modal'),_to=document.getElementById('p3successToast');
        if(_sA){_sA.style.cssText='display:flex;opacity:1';}
        if(_sB){_sB.style.cssText='display:none;opacity:0';}
        if(_sC){_sC.style.cssText='display:none;opacity:0';}
        if(_mo){_mo.style.cssText='display:none;opacity:0';}
        if(_to){_to.style.cssText='display:none;opacity:0';}
        const _sb=document.getElementById('p3saveBtn');
        if(_sb){_sb.classList.remove('saved');_sb.innerHTML='<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 2h6l2 2v6a1 1 0 01-1 1H2a1 1 0 01-1-1V3a1 1 0 011-1z" stroke="currentColor" stroke-width="1.3"/><path d="M4 12V7h4v5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg> Save as Report';}
        const _te=document.getElementById('p3typedEmail');if(_te)_te.textContent='';
        const _tx2=document.getElementById('p3tagX');if(_tx2)_tx2.style.opacity='0';
        const _tt2=document.getElementById('p3tagTyping');if(_tt2)_tt2.style.display='none';
        const _ar2=document.getElementById('p3addRecipient');if(_ar2)_ar2.style.display='none';
        const _cu=document.getElementById('p3cursor');if(_cu)_cu.style.display='none';

        requestAnimationFrame(()=>p.classList.add('active'));
        if(typeof p3Init==='function') setTimeout(p3Init,100);
      } else if(i===4){
        if(typeof p4_chain!=='undefined') p4_chain.forEach(clearTimeout);
        // ── full reset BEFORE panel becomes visible ──
        const _p4sA=document.getElementById('p4screenA');
        const _p4sB=document.getElementById('p4screenB');
        const _p4jm=document.getElementById('p4jiraModal');
        const _p4t=document.getElementById('p4successToast');
        const _p4c=document.getElementById('p4cursor');
        const _p4sm=document.getElementById('p4jmSummary');
        if(_p4sA){_p4sA.style.cssText='display:flex;flex-direction:column;flex:1;overflow:hidden;opacity:1';}
        if(_p4sB){_p4sB.style.cssText='display:none;visibility:hidden;opacity:0;flex-direction:column;flex:1;overflow:hidden';}
        if(_p4jm){_p4jm.style.cssText='display:none;opacity:0';}
        if(_p4t){_p4t.style.cssText='display:none;opacity:0';}
        if(_p4c){_p4c.style.cssText='display:none;position:absolute;z-index:999;pointer-events:none';}
        if(_p4sm) _p4sm.textContent='';
        const _p4db=document.getElementById('p4detailBody');if(_p4db) _p4db.scrollTop=0;
        document.querySelectorAll('.p4-insight-row').forEach(r=>r.classList.remove('p4-row-active'));
        // Force panel invisible, disable transition, reset, then show
        p.style.transition='none';
        p.style.opacity='0';
        p.style.transform='translateY(0) scale(1)';
        p.classList.add('active');
        // After one frame, re-enable transition and fade in
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          p.style.transition='';
          p.style.opacity='';
          p.style.transform='';
        }));
        if(typeof p4Init==='function') setTimeout(p4Init, 150);
      } else {
        const clone=p.cloneNode(true);
        p.parentNode.replaceChild(clone,p);
        requestAnimationFrame(()=>clone.classList.add('active'));
      }
    }
  });
  cur=n;
}

/* ── P0 cursor & demo engine ── */
// ── P0 cursor & demo engine ──────────────────────────────

let _p0t = null;
let _p0chain = [];

function p0stopDemo(){
  _p0chain.forEach(id=>clearTimeout(id));
  _p0chain = [];
}

function _p0T(fn, ms){ const id=setTimeout(fn,ms); _p0chain.push(id); }

// Move cursor to element center, relative to the inner container
function _p0mov(el){
  const cursor = document.getElementById('p0cursor');
  const container = document.getElementById('p0inner');
  if(!cursor||!el||!container) return;
  const cr = container.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  cursor.style.left = (er.left - cr.left + er.width/2  - 9) + 'px';
  cursor.style.top  = (er.top  - cr.top  + er.height/2 - 9) + 'px';
}

function _p0clk(el, cb){
  _p0mov(el);
  const cursor = document.getElementById('p0cursor');
  setTimeout(()=>{
    if(cursor){ cursor.classList.add('clicking'); setTimeout(()=>cursor.classList.remove('clicking'),250); }
    if(cb) setTimeout(cb, 150);
  }, 480);
}

function _p0type(inputId, text, speed=58){
  const inp = document.getElementById(inputId);
  if(!inp) return;
  inp.classList.add('p0-focus'); inp.value='';
  let i=0;

  const cursor=document.getElementById('p0cursor');

  // Show cursor
  _p0T(()=>{
    if(!cursor) return;
    cursor.style.transition='none';
    cursor.style.left='55px'; cursor.style.top='40px';
    cursor.style.display='block';
    setTimeout(()=>{ cursor.style.transition='left .45s cubic-bezier(.4,0,.2,1),top .45s cubic-bezier(.4,0,.2,1)'; },30);
  }, 300);

  // Move to Stripe card
  _p0T(()=>{ _p0mov(document.getElementById('p0stripe')); }, 700);

  // Hover: darken + show Connect button
  _p0T(()=>{
    const bg=document.getElementById('p0stripe-bg');
    const sb=document.getElementById('p0stripe-btn');
    if(bg) bg.style.background='rgba(0,0,0,.75)';
    if(sb) sb.style.opacity='1';
  }, 1200);

  // Move cursor onto the Connect pill
  _p0T(()=>{
    const sb=document.getElementById('p0stripe-btn');
    if(sb&&cursor){
      const cont=document.getElementById('p0inner').getBoundingClientRect();
      const er=sb.getBoundingClientRect();
      cursor.style.left=(er.left-cont.left+er.width/2-9)+'px';
      cursor.style.top=(er.top-cont.top+er.height/2-9)+'px';
    }
  }, 1600);

  // Click → open OAuth
  _p0T(()=>{
    cursor.classList.add('clicking');
    setTimeout(()=>cursor.classList.remove('clicking'),250);
    const bg=document.getElementById('p0stripe-bg');
    const sb=document.getElementById('p0stripe-btn');
    if(bg) bg.style.background='rgba(0,0,0,0)';

    p0showModal();
  }, 2000);

  // Move to account field & type email
  _p0T(()=>{ _p0mov(document.getElementById('p0iStripe')); }, 2700);
  _p0T(()=>{
    const el=document.getElementById('p0iStripe');
    if(!el) return;
    el.classList.add('p0-focus');
    const txt='acme-corp@stripe.com'; let i=0;
    const iv=setInterval(()=>{
      el.textContent=txt.slice(0,++i);
      if(i>=txt.length){ clearInterval(iv); el.classList.remove('p0-focus'); }

    _p0chain.push(iv);
  }, 3100);

  // Move to Allow access
  _p0T(()=>{ _p0mov(document.getElementById('p0ConnectBtn')); }, 5200);
  _p0T(()=>{ _p0clk(document.getElementById('p0ConnectBtn'), ()=>p0showSpinner()); }, 5700);
  _p0T(()=>{ p0showSuccess(); }, 7700);
  // loop: restart after showing success
  _p0T(()=>{ if(cur === 0) p0startDemo(); }, 10000);
}

// p1 metrics panel vars — resolved lazily
let p1WIN, p1cur;
let p1_loopCount = 0;
let p1_chain = [];

function p1_t(ms){ return new Promise(r => { const id = setTimeout(r, ms); p1_chain.push(id); }); }

function p1_pos(el){
  const wr = p1WIN.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return {
    x: er.left - wr.left + er.width/2,
    y: er.top - wr.top + er.height/2
  };
}

function p1_moveTo(x, y){
  p1cur.style.left = (x-2)+'px';
  p1cur.style.top = (y-2)+'px';
}

async function p1_moveCursor(el, ox=0, oy=0){
  const p = p1_pos(el);
  p1_moveTo(p.x+ox, p.y+oy);
  await p1_t(200);
}

async function p1_click(el, ox=0, oy=0){
  await p1_moveCursor(el, ox, oy);
  p1cur.classList.add('clicking');
  await p1_t(100);
  p1cur.classList.remove('clicking');
}

function p1_showCursor(){
  p1cur.style.display = 'block';
  p1cur.style.transition = 'none';
  p1_moveTo(80, 40);
  requestAnimationFrame(()=>{
    p1cur.style.transition = 'left .4s cubic-bezier(.4,0,.2,1), top .4s cubic-bezier(.4,0,.2,1)';
  });
}

// typing into input
async function p1_typeInto(el, text, speed=55){
  el.classList.add('focused');
  el.value = '';
  for(let ch of text){
    el.value += ch;
    await p1_t(speed);
  }
  el.classList.remove('focused');
}

// typing into textarea
async function p1_typeArea(el, text, speed=40){
  el.classList.add('focused');
  el.value = '';
  for(let ch of text){
    el.value += ch;
    await p1_t(speed);
  }
  el.classList.remove('focused');
}

function p1_fillSelect(id, valId, text){
  document.getElementById(id).classList.add('filled');
  document.getElementById(valId).textContent = text;
}

// Interactive dropdown toggle (for manual use)
function p1_closeAllDrops(){
  document.querySelectorAll('#p1 .ds-dropdown').forEach(d => d.classList.remove('open'));
  document.querySelectorAll('#p1 .ds-sel').forEach(s => s.classList.remove('open'));
}

function p1_toggleDrop(ddId){
  const dd = document.getElementById(ddId);
  const isOpen = dd.classList.contains('open');
  p1_closeAllDrops();
  if(!isOpen){
    dd.classList.add('open');
    dd.previousElementSibling.classList.add('open');
  }
}

function p1_pickDrop(selId, valId, ddId, label, value){
  const sel = document.getElementById(selId);
  const dd = document.getElementById(ddId);
  sel.classList.remove('open');
  sel.classList.add('filled');
  document.getElementById(valId).textContent = label;
  dd.classList.remove('open');
  dd.querySelectorAll('.dd-item').forEach(i => {
    i.classList.toggle('selected', i.textContent.trim().includes(value));
  });
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if(!e.target.closest('#p1 .ds-col') && !e.target.closest('#p1')) p1_closeAllDrops();
});

// Animation: move cursor to sel, click to open, move to item, click to pick
async function p1_animPick(selId, ddId, valId, label, value){
  const sel = document.getElementById(selId);
  const dd  = document.getElementById(ddId);
  p1_closeAllDrops();
  await p1_moveCursor(sel);
  await p1_t(100);
  p1cur.classList.add('clicking'); await p1_t(120); p1cur.classList.remove('clicking');
  dd.classList.add('open');
  sel.classList.add('open');
  await p1_t(150);
  let target = null;
  dd.querySelectorAll('.dd-item').forEach(i => {
    if(i.textContent.trim().includes(value)) target = i;
  });
  if(target){
    await p1_moveCursor(target);
    await p1_t(80);
    p1cur.classList.add('clicking'); await p1_t(100); p1cur.classList.remove('clicking');
    dd.classList.remove('open');
    sel.classList.remove('open');
    sel.classList.add('filled');
    document.getElementById(valId).textContent = label;
    dd.querySelectorAll('.dd-item').forEach(i => {
      i.classList.toggle('selected', i.textContent.trim().includes(value));
    });
  }
  await p1_t(100);
}

function p1_closeModal(){

}

  const moreBtn = document.getElementById('p1cacMoreBtn');

  // 3. Click more
  await p1_click(moreBtn);
  document.getElementById('p1ctxMenu').classList.add('show');
  await p1_t(280);

  // 4. Move to Edit option
  const editItem = document.getElementById('p1ctxEdit');

  });

  p1_loopCount++;

    if(cur === 1) p1_runDemo();
  } else {
    p1_runDemo();
  }
}

let p4_chain = [];
function p4_t(ms){ return new Promise(r=>{ const id=setTimeout(r,ms); p4_chain.push(id); }); }

function p4_getEl(id){ return document.getElementById(id); }

async function p4_fade(el, toOpacity, ms=250, display=''){
  if(toOpacity===1 && display) { el.style.display=display; el.style.opacity='0'; }
  el.style.transition=`opacity ${ms}ms ease`;
  await p4_t(20);
  el.style.opacity = String(toOpacity);
  await p4_t(ms);
  if(toOpacity===0) el.style.display='none';
}

function p4_cursorPos(el){
  // Walk offsetParent chain to get position relative to sc-panel
  let x = el.offsetLeft + el.offsetWidth/2 - 9;
  let y = el.offsetTop + el.offsetHeight/2 - 9;
  let node = el.offsetParent;
  while(node && !node.classList.contains('sc-panel')){
    x += node.offsetLeft;
    y += node.offsetTop;
    node = node.offsetParent;
  }
  return {x, y};
}

async function p4_moveCursor(cur, panelEl, el, ms=450){
  const {x,y} = p4_cursorPos(el);
  cur.style.transition=`left ${ms}ms cubic-bezier(.4,0,.2,1),top ${ms}ms cubic-bezier(.4,0,.2,1)`;
  cur.style.left = x+'px'; cur.style.top = y+'px';
  await p4_t(ms);
}

async function p4_click(cur, panelEl, el){
  await p4_moveCursor(cur, null, el);
  cur.style.transform='scale(.8)'; await p4_t(100); cur.style.transform='scale(1)'; await p4_t(120);
}

async function p4_typeText(elId, text, speed=38){
  const el = p4_getEl(elId); if(!el) return;
  el.textContent='';
  for(const ch of text){

    await p4_t(speed);

}

/* ── initShowcase ── */

function initShowcase() {
  const mount = document.getElementById('showcase-mount');
  if (!mount) return;
  if (mount.children.length > 0) {
    // already mounted — only start first step if scrolled into view
    if (!showcaseStarted) { cur = 0; goToStep(0); showcaseStarted = true; }
    return;
  }
  const tmpl = document.getElementById('showcase-template');
  if (!tmpl) return;
  mount.appendChild(tmpl.content.cloneNode(true));
  // Fade-in observer for general elements
  const fadeObs = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
  }, {threshold: 0.07});
  mount.querySelectorAll('.fade-in').forEach(el => fadeObs.observe(el));
  document.addEventListener('click', e => {
    if(!e.target.closest('#p1 .ds-col') && !e.target.closest('#p1')) {
      if(typeof p1_closeAllDrops === 'function') p1_closeAllDrops();
    }
  });
  // Scroll-triggered: start first step animation only when showcase enters viewport
  const scrollObs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if(e.isIntersecting && !showcaseStarted){
        showcaseStarted = true;
        cur = 0; goToStep(0);
        scrollObs.disconnect();
      }
    });
  }, {threshold: 0.15});
  const showcase = mount.querySelector('.showcase');
  if(showcase) scrollObs.observe(showcase);
}
window.initShowcase = initShowcase;

// ─── HERO ───
function Hero() {
  const questions = [
    "Why did our MRR drop last week?",
    "Which channel has the best CAC?",
    "What's driving churn this quarter?",
    "Show me net revenue retention"
  ];
  const [currentQ, setCurrentQ] = useState(0);
  const [displayText, setDisplayText] = useState("");
  const [isDeleting, setIsDeleting] = useState(false);
  const [isActive, setIsActive] = useState(false);
  const [userText, setUserText] = useState("");
  const [tooltip, setTooltip] = useState(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (isActive) return;
    const fullText = questions[currentQ];
    let timeout;

    if (!isDeleting && displayText.length < fullText.length) {
      timeout = setTimeout(() => {
        setDisplayText(fullText.slice(0, displayText.length + 1));
      }, 40 + Math.random() * 30);
    } else if (!isDeleting && displayText.length === fullText.length) {
      timeout = setTimeout(() => setIsDeleting(true), 2000);
    } else if (isDeleting && displayText.length > 0) {
      timeout = setTimeout(() => {
        setDisplayText(displayText.slice(0, -1));
      }, 20);
    } else if (isDeleting && displayText.length === 0) {
      setIsDeleting(false);
      setCurrentQ((currentQ + 1) % questions.length);
    }

    return () => clearTimeout(timeout);
  }, [displayText, isDeleting, currentQ, isActive]);

  const handleChatClick = () => {
    if (!isActive) {
      setIsActive(true);
      setUserText("");
      setTimeout(() => inputRef.current && inputRef.current.focus(), 50);
    }
  };

  const showTooltip = (e, id) => {
    e.stopPropagation();
    setTooltip(tooltip === id ? null : id);
  };

  useEffect(() => {
    if (!tooltip) return;

// ─── ARCH RIGHT — stream + cards fully synced ───
function ArchRight({ outputs }) {
  const STREAM_MS  = 2400;  // stream travel time
  const STEP_MS    = 180;   // between card waves
  const HOLD_MS    = 1200;  // cards stay lit
  const PAUSE_MS   = 1800;  // pause before next cycle
  const CYCLE = STREAM_MS + STEP_MS * 2 + HOLD_MS + PAUSE_MS;

  const [streaming, setStreaming] = React.useState(false);
  const [litCards,  setLitCards]  = React.useState([]);
  const waves = [[2], [1, 3], [0, 4]];

  React.useEffect(() => {
    let timeouts = [];

    function runCycle() {
      setStreaming(false);
      setLitCards([]);

      // Start stream on next tick so transition triggers
      const t0 = setTimeout(() => setStreaming(true), 50);
      timeouts.push(t0);

      // Light up cards exactly when stream finishes
      waves.forEach((wave, wi) => {
        const t = setTimeout(() => {
          setLitCards(prev => [...new Set([...prev, ...wave])]);
        }, STREAM_MS + wi * STEP_MS);
        timeouts.push(t);
      });

      // Fade all cards
      const fadeAt = STREAM_MS + (waves.length - 1) * STEP_MS + HOLD_MS;
      const tFade = setTimeout(() => setLitCards([]), fadeAt);
      timeouts.push(tFade);
    }

    runCycle();
    const interval = setInterval(runCycle, CYCLE);
    return () => { timeouts.forEach(clearTimeout); clearInterval(interval); };
  }, []);

  return (
    <div style={{ display: 'contents' }}>
      {/* Stream connector */}
      <div className="relative flex items-center" style={{ height: '32px', overflow: 'hidden' }}>
        <div style={{ position: 'relative', width: '100%', height: '1px', background: 'rgba(7,128,126,0.15)' }}>
          <div style={{
            position: 'absolute',
            top: '-0.5px',
            width: '40px',
            height: '1px',
            borderRadius: '1px',
            background: 'linear-gradient(90deg, rgba(9,160,157,0) 0%, var(--ins-color-teal-400) 60%, #13D4D1 100%)',
            left: streaming ? 'calc(100% + 40px)' : '-40px',
            transition: streaming ? `left ${STREAM_MS}ms linear` : 'none',
          }}/>
        </div>
      </div>

      {/* Output cards */}
      <div className="flex flex-col justify-between" style={{ alignSelf: 'stretch' }}>
        {outputs.map((o, i) => {
          const isLit = litCards.includes(i);
          return (
            <div key={o.title} className="flex items-center gap-3 px-4 py-3.5 rounded-card" style={{
              border: `1px solid ${isLit ? 'rgba(9,160,157,0.5)' : 'var(--ins-border-default)'}`,
              background: isLit ? 'rgba(7,128,126,0.08)' : 'var(--ins-surface-card)',
              boxShadow: isLit ? '0 0 16px rgba(9,160,157,0.15), inset 0 0 20px rgba(9,160,157,0.05)' : 'none',
              transition: 'all 0.2s ease',
            }}>
              <div className="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style={{background: 'rgba(7,128,126,0.15)', border: '1px solid rgba(7,128,126,0.3)'}}>{o.icon}</div>
              <div>
                <p className="text-sm font-medium text-white">{o.title}</p>
                <p className="text-xs text-[var(--ins-text-inactive)]">{o.desc}</p>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── WHAT IS INSIGHTIS ───
function AnimatedStat({ target, suffix, prefix, duration = 1800 }) {
  const [count, setCount] = React.useState(0);
  const [started, setStarted] = React.useState(false);
  const ref = React.useRef(null);

  React.useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started) {
        setStarted(true);
        observer.disconnect();
      }
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [started]);

  React.useEffect(() => {
    if (!started) return;
    let startTime = null;
    const step = (timestamp) => {
      if (!startTime) startTime = timestamp;
      const progress = Math.min((timestamp - startTime) / duration, 1);
      // ease-out cubic
      const eased = 1 - Math.pow(1 - progress, 3);
      setCount(Math.floor(eased * target));
      if (progress < 1) requestAnimationFrame(step);
      else setCount(target);
    };
    requestAnimationFrame(step);
  }, [started, target, duration]);

  return (
    <span ref={ref}>
      {prefix}{count.toLocaleString()}{suffix}
    </span>
  );
}

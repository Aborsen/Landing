<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: var(--ins-surface-page);
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}



/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── SECTION SPACING ── */
section { position: relative; }

@keyframes tileIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── CONNECTORS LAYOUT ── */
.connectors-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  align-items: start;
  padding-bottom: 120px;
  position: relative;
  z-index: 1;
}
.connectors-sidebar-col {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 72px);
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.055);
  padding: 24px 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.connectors-sidebar-col::-webkit-scrollbar { display: none; }
.connectors-content {
  padding: 24px 0 0 32px;
  min-width: 0;
}
@media (max-width: 900px) {
  .connectors-layout { grid-template-columns: 1fr; }
  .connectors-sidebar-col { display: none; }
  .connectors-content { padding: 16px 0 0 0; }
}

.connector-search {
  display: flex; align-items: center; gap: 10px;
  background: rgba(16,22,30,0.7);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 12px;
  padding: 11px 14px;
  width: 100%;
  margin: 0 0 24px;
  transition: border-color .2s;
}

/* ── FLOATING CHAT ALIGN TO CONNECTORS GRID ── */
.floating-chat-wrap {
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  padding: 16px 0 20px 292px; /* 260 sidebar + 32 gap */
}
.floating-chat-wrap > div {
  max-width: 520px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .floating-chat-wrap { padding: 16px 0 20px; }
  .floating-chat-wrap > div { max-width: 100%; }
}
.connector-search:focus-within { border-color: rgba(9,160,157,.5); }
.connector-search input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 14px; color: #E8F2F5; font-family: 'Geist', sans-serif;
}

.cat-group-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 6px 16px;
  color: #5E8290; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  font-family: 'Geist', sans-serif;
  margin-bottom: 4px;
}
.cat-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 7px 16px;
  background: transparent; border: none; cursor: pointer;
  text-align: left; font-size: 13px;
  color: var(--ins-text-inactive); font-family: 'Geist', sans-serif;
  transition: background .12s, color .12s;
  border-left: 2px solid transparent;
}
.cat-item:hover { background: rgba(255,255,255,0.04); color: #E8F2F5; }
.cat-item.active {
  background: rgba(10,152,150,0.08);
  border-left-color: var(--ins-color-teal-700);
  color: #E8F2F5;
}
.cat-item .count {
  margin-left: auto;
  font-size: 11px; color: #5E8290;
  font-family: 'Geist Mono', monospace;
}
.cat-item.active .count { color: var(--ins-text-highlight); }

.connector-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
@media (max-width: 1100px) { .connector-grid { grid-template-columns: repeat(5, 1fr); } }
@media (max-width: 900px)  { .connector-grid { grid-template-columns: repeat(4, 1fr); } }
@media (max-width: 640px)  { .connector-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 440px)  { .connector-grid { grid-template-columns: repeat(2, 1fr); } }

.connector-tile {
  position: relative;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  aspect-ratio: 1 / 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  padding: 16px 10px;
  transition: border-color .2s, background .2s, transform .2s;
  cursor: pointer;
  overflow: hidden;
  animation: tileIn .35s ease both;
}
.connector-tile:hover {
  border-color: rgba(9,160,157,.4);
  background: rgba(13,17,23,0.6);
}
.connector-tile:hover .connector-overlay { opacity: 1; pointer-events: auto; }
.connector-tile:hover .connector-face     { opacity: 0.18; transform: scale(.96); }

.connector-logo {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  background: #fff;
  padding: 6px;
  flex-shrink: 0;
}
.connector-logo img { width: 100%; height: 100%; object-fit: contain; }
.connector-logo .fallback {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  color: var(--ins-surface-page);
}
.connector-face {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px;
  transition: opacity .2s, transform .2s;
  text-align: center;
}
.connector-name {
  font-size: 12.5px; color: #C8D8DE; font-weight: 500;
  text-align: center; line-height: 1.25;
  max-width: 100%;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── HOVER OVERLAY ── */
.connector-overlay {
  position: absolute; inset: 8px;
  display: flex; flex-direction: column;
  align-items: stretch; justify-content: center;
  gap: 6px;
  padding: 12px 10px;
  border-radius: 8px;
  background: linear-gradient(160deg, rgba(9,160,157,0.92) 0%, rgba(7,128,126,0.96) 100%);
  opacity: 0; pointer-events: none;
  transition: opacity .18s;
}
.connector-overlay .banner-label {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: rgba(255,255,255,0.85);
  text-align: center;
  margin-bottom: 2px;
}
.overlay-btn {
  display: flex; align-items: center; justify-content: center; gap: 5px;
  padding: 7px 8px;
  border-radius: 6px; border: none; cursor: pointer;
  font-size: 11.5px; font-weight: 600;
  font-family: 'Geist', sans-serif;
  line-height: 1.2; text-align: center;
  transition: background .15s, transform .15s;
}
.overlay-btn.primary {
  background: var(--ins-surface-page); color: #fff;
}
.overlay-btn.primary:hover { background: #000; transform: translateY(-1px); }
.overlay-btn.secondary {
  background: rgba(255,255,255,0.12); color: #fff;
  border: 1px solid rgba(255,255,255,0.18);
}
.overlay-btn.secondary:hover { background: rgba(255,255,255,0.2); transform: translateY(-1px); }

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--ins-font-family-sans);
  background: var(--ins-surface-page);
  color: var(--ins-color-gray-50);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: var(--ins-z-base);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}



/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--ins-color-white-a-10); border-radius: var(--ins-radius-2); }

/* ── SECTION SPACING ── */
section { position: relative; }

@keyframes tileIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* ── CONNECTORS LAYOUT ── */
.connectors-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  align-items: start;
  padding-bottom: 120px;
  position: relative;
  z-index: 1;
}
.connectors-sidebar-col {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 72px);
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.055);
  padding: 24px 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.connectors-sidebar-col::-webkit-scrollbar { display: none; }
.connectors-content {
  padding: 24px 0 0 32px;
  min-width: 0;
}
@media (max-width: 900px) {
  .connectors-layout { grid-template-columns: 1fr; }
  .connectors-sidebar-col { display: none; }
  .connectors-content { padding: 16px 0 0 0; }
}

.connector-search {
  display: flex; align-items: center; gap: 10px;
  background: rgba(16,22,30,0.7);
  border: 1px solid var(--ins-color-white-a-07);
  border-radius: var(--ins-radius-12);
  padding: 11px 14px;
  width: 100%;
  margin: 0 0 24px;
  transition: border-color .2s;
}

/* ── FLOATING CHAT ALIGN TO CONNECTORS GRID ── */
.floating-chat-wrap {
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  padding: 16px 0 20px 292px; /* 260 sidebar + 32 gap */
}
.floating-chat-wrap > div {
  max-width: 520px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .floating-chat-wrap { padding: 16px 0 20px; }
  .floating-chat-wrap > div { max-width: 100%; }
}
.connector-search:focus-within { border-color: var(--ins-color-teal-a-50); }
.connector-search input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: var(--ins-font-size-14); color: var(--ins-color-gray-50); font-family: var(--ins-font-family-sans);
}

.cat-group-header {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 6px 16px;
  color: #5E8290; font-size: var(--ins-font-size-11); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  font-family: var(--ins-font-family-sans);
  margin-bottom: var(--ins-size-1);
}
.cat-item {
  display: flex; align-items: center; gap: 10px;
  width: 100%; padding: 7px 16px;
  background: transparent; border: none; cursor: pointer;
  text-align: left; font-size: 13px;
  color: var(--ins-text-inactive); font-family: var(--ins-font-family-sans);
  transition: background .12s, color .12s;
  border-left: 2px solid transparent;
}
.cat-item:hover { background: var(--ins-color-white-a-04); color: var(--ins-color-gray-50); }
.cat-item.active {
  background: rgba(10,152,150,0.08);
  border-left-color: var(--ins-color-teal-700);
  color: var(--ins-color-gray-50);
}
.cat-item .count {
  margin-left: auto;
  font-size: var(--ins-font-size-11); color: #5E8290;
  font-family: var(--ins-font-family-mono);
}
.cat-item.active .count { color: var(--ins-text-highlight); }

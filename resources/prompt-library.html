<meta charset="UTF-8">

<title>Prompt Library — Insightis</title>
<meta name="description" content="Browse the Insightis prompt library — 100+ ready-to-use questions across revenue, marketing, product, finance, and ops. Copy a prompt, connect your data, get the answer in plain English.">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--ins-font-family-sans);
  background: var(--ins-surface-page);
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: var(--ins-z-base);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}



/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes cardFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: var(--ins-radius-2); }

/* ── SECTION SPACING ── */
section { position: relative; }

/* ── PROMPT LIBRARY LAYOUT ── */
.prompt-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  align-items: start;
  position: relative;
  z-index: 1;
}
.prompt-sidebar-col {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 72px);
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.055);
  padding: 24px 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.prompt-sidebar-col::-webkit-scrollbar { display: none; }
.prompt-content {
  padding: 24px 0 120px 32px;
  display: flex;
  flex-direction: column;
  gap: var(--ins-size-3);
  min-width: 0;
}
/* Mobile filters toggle — hidden on desktop, shown <=900px (QA #3) */
.prompt-filters-toggle { display: none; }
@media (max-width: 900px) {
  .prompt-layout { grid-template-columns: 1fr; }
  .prompt-sidebar-col { display: none; }
  .prompt-filters-toggle {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; margin: 16px 0 0; padding: 11px 14px;
    background: rgba(255,255,255,.03);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    color: var(--ins-text-body); font-size: 14px; font-weight: 500;
    font-family: inherit; cursor: pointer;
  }
  .prompt-sidebar-col.is-open {
    display: block;
    position: static; max-height: none;
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.055);
    padding: 12px 0 16px;
  }
  .prompt-content { padding: 16px 0 100px 0; }
}

/* ── FLOATING CHAT ALIGN TO PROMPTS GRID ── */
.floating-chat-wrap {
  max-width: 1280px;
  margin: 0 auto;
  width: calc(100% - 48px);
  padding: 16px 0 20px 292px; /* 260 sidebar + 32 gap */
}
.floating-chat-wrap > div {
  max-width: 520px;
  margin: 0 auto;
}
@media (max-width: 900px) {
  .floating-chat-wrap { padding: 16px 0 20px; }
  .floating-chat-wrap > div { max-width: 100%; }
}

/* ── PROMPT CARD ── */
.prompt-card {
  /* shell + hover moved to DS .ins-prompt-card (audit #23); padding + entrance anim stay here */
  padding: 18px 22px;
  animation: cardFadeIn .35s ease both;
}
.prompt-card .view-btn {
  color: var(--ins-text-highlight);
  font-size: 13px;
  font-weight: 500;
  background: none;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: var(--ins-font-family-sans);
  padding: 4px 0;
  transition: gap .15s;
}
.prompt-card .view-btn:hover { gap: 10px; }

.team-pill {
  display: inline-block;
  font-size: 10.5px;
  padding: 2px 8px;
  border-radius: var(--ins-radius-4);
  border: 1px solid rgba(9,160,157,.22);
  background: rgba(9,160,157,.06);
  color: #8DC9CB;
  letter-spacing: .02em;
  font-family: var(--ins-font-family-mono);
}

.ds-icon-wrap {
  width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: var(--ins-radius-4);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.05);
}

/* ── FILTER CHECKBOX ── */
.filter-item {
  display: flex; align-items: center; gap: 9px;
  padding: 5px 16px; cursor: pointer;
  transition: background .12s;
  font-size: 13px;
  color: var(--ins-text-inactive);
  font-family: var(--ins-font-family-sans);
  user-select: none;
}
.filter-item:hover { background: rgba(255,255,255,0.04); color: #E8F2F5; }
.filter-item.checked { color: #E8F2F5; }
.filter-checkbox {
  width: 13px; height: 13px;
  border-radius: 3px;
  border: 1px solid rgba(255,255,255,.18);
  background: transparent;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: border-color .15s, background .15s;
}
.filter-item.checked .filter-checkbox {
  border-color: var(--ins-text-highlight);
  background: var(--ins-text-highlight);
}

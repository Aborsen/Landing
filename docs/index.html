<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: var(--ins-surface-page);
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}



/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideInRight { from{opacity:0;transform:translateX(24px)} to{opacity:1;transform:translateX(0)} }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── SECTION SPACING ── */
section { position: relative; }

/* ── DOCS TABS BAR ── */
.docs-tabs-bar {
  position: sticky;
  top: 68px;
  z-index: 40;
  background: rgba(10,14,19,0.95);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(255,255,255,0.055);
}

/* ── DOCS 3-COLUMN LAYOUT ── */
.docs-layout {
  display: grid;
  grid-template-columns: 240px 1fr 160px;
  align-items: start;
  position: relative;
  z-index: 1;
}

/* ── DOCS SIDEBAR (LEFT) ── */
.docs-sidebar-col {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 72px);
  overflow-y: auto;
  border-right: 1px solid rgba(255,255,255,0.055);
  padding: 24px 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.docs-sidebar-col::-webkit-scrollbar { display: none; }

/* ── DOCS TOC (RIGHT) ── */
.docs-toc-col {
  position: sticky;
  top: 72px;
  max-height: calc(100vh - 72px);
  overflow-y: auto;
  border-left: 1px solid rgba(255,255,255,0.055);
  padding: 28px 8px 28px 16px;
}
.docs-toc-col::-webkit-scrollbar { width: 3px; }

/* ── DOCS CONTENT (CENTER) ── */
.docs-content-col {
  padding: 40px 48px 80px;
  min-width: 0;
}

/* ── RESPONSIVE ── */
@media (max-width: 1100px) {
  .docs-layout { grid-template-columns: 220px 1fr; }
  .docs-toc-col { display: none; }
}
@media (max-width: 768px) {
  .docs-layout { grid-template-columns: 1fr; }
  .docs-sidebar-col { display: none; }
  .docs-content-col { padding: 24px 20px 60px; }
}

/* ── DOCS MD-SECTION BODY ── */
.doc-section-body { font-size: 15px; color: var(--ins-text-inactive); line-height: 1.8; }
.doc-section-body p { margin: 0 0 14px; }
.doc-section-body p:last-child { margin-bottom: 0; }
.doc-section-body ul,
.doc-section-body ol { margin: 0 0 14px; padding-left: 22px; }
.doc-section-body li { margin: 4px 0; }
.doc-section-body li::marker { color: #3A5260; }
.doc-section-body strong { color: #E8F2F5; font-weight: 600; }
.doc-section-body a { color: var(--ins-text-highlight); text-decoration: none; }
.doc-section-body a:hover { color: #14E0DD; }
.doc-section-body code {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 13px;
  color: #E8F2F5;
  font-family: 'Geist Mono', ui-monospace, monospace;
}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "How long does it take to connect a data source to Insightis?",
      "acceptedAnswer": { "@type": "Answer", "text": "Most connectors go live in under five minutes. You authenticate with OAuth or an API key, pick the objects you want, and Insightis starts syncing immediately. Connections are read-only, SOC 2 secured, and refreshed continuously — no engineering work or pipeline maintenance required." }
    },
    {
      "@type": "Question",
      "name": "Which data sources does Insightis integrate with?",
      "acceptedAnswer": { "@type": "Answer", "text": "Insightis supports 200+ connectors across CRMs (HubSpot, Salesforce, Pipedrive), warehouses (Snowflake, BigQuery, Redshift), ad platforms (Google Ads, Meta, LinkedIn), product analytics (Mixpanel, Amplitude, PostHog), finance (Stripe, QuickBooks, NetSuite) and ops tools (Jira, Linear, Slack). New connectors are added monthly based on customer demand." }
    },
    {
      "@type": "Question",
      "name": "Do I need SQL or a data engineer to use Insightis integrations?",
      "acceptedAnswer": { "@type": "Answer", "text": "No. Insightis' semantic layer maps every connected source to certified business metrics — MRR, CAC, NRR, WAU — so your team asks questions in plain English and gets a precise answer. SQL is optional for power users, never a requirement for daily use." }
    },
    {
      "@type": "Question",
      "name": "Is my data secure once it's connected?",
      "acceptedAnswer": { "@type": "Answer", "text": "Yes. All connectors are read-only and authenticated via OAuth or scoped API keys. Insightis is SOC 2 Type II compliant, encrypts data in transit and at rest, and never writes back to your source systems. You can revoke a connection at any time from the admin panel." }
    },
    {
      "@type": "Question",
      "name": "What happens when fields or metrics conflict across sources?",
      "acceptedAnswer": { "@type": "Answer", "text": "The semantic layer resolves conflicts automatically. It reconciles naming (deal vs opportunity), time zones, currencies, and duplicate records so the answer stays consistent whether the question starts in Stripe, HubSpot, or Snowflake. Certified metrics are versioned, so changes are auditable." }
    }
  ]
}

                          </div>
                        </>);
                        return item.notClickable ? (
                          <div key={ii} className="flex items-start gap-3 px-3 py-2.5 rounded-xl group" style={{cursor:'default'}}>{inner}</div>
                        ) : (
                          <a key={ii} href={linkUrls[item.label] || '#'} {...(item.external ? {target:'_blank', rel:'noopener noreferrer'} : {})} onClick={() => setActiveDropdown(null)} className="flex items-start gap-3 px-3 py-2.5 rounded-xl hover:bg-white/[0.05] transition-colors group">{inner}</a>
                        );

      )}
    </>

function BrandTile({name, slug, domain, color}) {
  const [idx, setIdx] = useState(0);
  const hex = color.replace('#','').toLowerCase();
  const sources = [
    domain ? `https://logo.clearbit.com/${domain}` : null,
    slug   ? `https://cdn.simpleicons.org/${slug}/${hex}` : null,
  ].filter(Boolean);
  return (
    <span style={{
      width:'22px',height:'22px',borderRadius:'6px',
      background:`${color}22`,border:`1px solid ${color}55`,
      display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,
      overflow:'hidden',
    }}>
      {idx < sources.length ? (
        <img
          key={sources[idx]}
          src={sources[idx]}
          width="15" height="15" alt=""
          draggable="false"
          onError={() => setIdx(idx + 1)}
          style={{display:'block',objectFit:'contain'}}
        />
      ) : (
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
          <ellipse cx="12" cy="6" rx="8" ry="3"/>
          <path d="M4 6v12c0 1.66 3.58 3 8 3s8-1.34 8-3V6"/>
          <path d="M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/>
        </svg>
      )}
    </span>
  );
}

function ConnectionChatAnimation() {
  const SOURCES = [
    {name:'HubSpot',    slug:'hubspot',        domain:'hubspot.com',    color:'#FF7A59'},
    {name:'Stripe',     slug:'stripe',         domain:'stripe.com',     color:'#635BFF'},
    {name:'Salesforce', slug:'salesforce',     domain:'salesforce.com', color:'#00A1E0'},
    {name:'PostgreSQL', slug:'postgresql',     domain:'postgresql.org', color:'#4169E1'},
    {name:'BigQuery',   slug:'googlebigquery', domain:null,             color:'#669DF6'},
    {name:'Snowflake',  slug:'snowflake',      domain:'snowflake.com',  color:'#29B5E8'},
    {name:'Jira',       slug:'jira',           domain:'atlassian.com',  color:'#2684FF'},
    {name:'Mixpanel',   slug:'mixpanel',       domain:'mixpanel.com',   color:'#7856FF'},
    {name:'Amplitude',  slug:'amplitude',      domain:'amplitude.com',  color:'#1E61F0'},
    {name:'Segment',    slug:'segment',        domain:'segment.com',    color:'#52BD94'},
    {name:'Intercom',   slug:'intercom',       domain:'intercom.com',   color:'#1F8DED'},
    {name:'Zoho CRM',   slug:'zoho',           domain:'zoho.com',       color:'#E42527'},
  ];

  const CHAOS_END     = 2800;
  const ORDER_END     = 4000;
  const BEAMS_ON      = 4200;
  const FINAL_STATE   = 7600;

  const containerRef = useRef(null);
  const canvasRef    = useRef(null);
  const sourceRefs   = useRef([]);
  const [phase, setPhase] = useState('chaos');

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    let W = el.clientWidth;
    let H = el.clientHeight;
    const pillW = 116, pillH = 32;
    const centerBox = 64;

    const recalc = () => {
      W = el.clientWidth;
      H = el.clientHeight;
    };
    window.addEventListener('resize', recalc);

    const items = SOURCES.map((s, i) => {
      const ringRx = Math.min(W * 0.36, 220);
      const ringRy = Math.min((H - 60) * 0.36, 160);
      const angle = (i / SOURCES.length) * Math.PI * 2 - Math.PI / 2;
      // Random chaos start outside center box
      let rx, ry;
      do {
        rx = (Math.random() - 0.5) * (W - pillW - 20);
        ry = (Math.random() - 0.5) * (H - pillH - 80);
      } while (Math.abs(rx) < centerBox + 40 && Math.abs(ry) < centerBox + 20);
      return {
        x: rx, y: ry,
        vx: (Math.random() - 0.5) * 0.9,
        vy: (Math.random() - 0.5) * 0.9,
        rot: (Math.random() - 0.5) * 18,
        vrot: (Math.random() - 0.5) * 0.35,
        tx: ringRx * Math.cos(angle),
        ty: ringRy * Math.sin(angle),
      };
    });

    const phaseRef = { current: 'chaos' };
    let raf, start = null;

    function loop(ts) {
      if (!start) start = ts;
      const t = ts - start;

      // Phase transitions
      if (t >= CHAOS_END && phaseRef.current === 'chaos') {
        phaseRef.current = 'ordering';
        setPhase('ordering');
        // Recompute targets with current W/H
        const ringRx = Math.min(W * 0.36, 220);
        const ringRy = Math.min((H - 60) * 0.36, 160);
        items.forEach((p, i) => {
          const angle = (i / SOURCES.length) * Math.PI * 2 - Math.PI / 2;
          p.tx = ringRx * Math.cos(angle);
          p.ty = ringRy * Math.sin(angle);
        });
      }
      if (t >= ORDER_END && phaseRef.current === 'ordering') {
        phaseRef.current = 'ordered';
        setPhase('ordered');
      }

      // Update pill positions
      if (phaseRef.current === 'chaos') {
        const bx = (W - pillW) / 2 - 4;
        const by = (H - pillH) / 2 - 34;
        items.forEach((p, i) => {
          p.x += p.vx;
          p.y += p.vy;
          p.rot += p.vrot;
          if (p.x < -bx || p.x > bx) { p.vx *= -1; p.x = Math.max(-bx, Math.min(bx, p.x)); }
          if (p.y < -by || p.y > by) { p.vy *= -1; p.y = Math.max(-by, Math.min(by, p.y)); }
          const n = sourceRefs.current[i];
          if (n) {
            n.style.transition = 'none';
            n.style.transform = `translate(-50%, -50%) translate(${p.x}px, ${p.y}px) rotate(${p.rot}deg)`;
          }
        });
      } else if (phaseRef.current === 'ordering') {
        items.forEach((p, i) => {
          const n = sourceRefs.current[i];
          if (n) {
            n.style.transition = 'transform 1.1s cubic-bezier(0.34, 1.25, 0.5, 1)';
            n.style.transform = `translate(-50%, -50%) translate(${p.tx}px, ${p.ty}px) rotate(0deg)`;
          }
        });
      }

      // Draw beams on canvas (ordered phase)
      const cv = canvasRef.current;
      if (cv) {
        const dpr = window.devicePixelRatio || 1;
        if (cv.width !== W * dpr || cv.height !== H * dpr) {
          cv.width = W * dpr; cv.height = H * dpr;
          cv.style.width = W + 'px'; cv.style.height = H + 'px';
        }
        const ctx = cv.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);

        if (t >= BEAMS_ON) {
          const fade = Math.min(1, (t - BEAMS_ON) / 700);
          const cx = W / 2, cy = H / 2 + 10; // offset slightly for header
          items.forEach((p, i) => {
            const sx = cx + p.tx;
            const sy = cy + p.ty;
            const grad = ctx.createLinearGradient(sx, sy, cx, cy);
            grad.addColorStop(0, `rgba(14,196,193,${0.05 * fade})`);
            grad.addColorStop(0.6, `rgba(14,196,193,${0.22 * fade})`);
            grad.addColorStop(1, `rgba(14,196,193,${0.40 * fade})`);
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(cx, cy);
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1;
            ctx.stroke();

            const pulse = ((t * 0.00028 + i / SOURCES.length) % 1);
            const px = sx + (cx - sx) * pulse;
            const py = sy + (cy - sy) * pulse;
            const pa = Math.sin(pulse * Math.PI) * 0.9 * fade;
            if (pa > 0.02) {
              ctx.beginPath();
              ctx.arc(px, py, 2.2, 0, Math.PI * 2);
              ctx.fillStyle = `rgba(200,255,254,${pa})`;
              ctx.shadowColor = 'rgba(14,196,193,0.85)';
              ctx.shadowBlur = 9;
              ctx.fill();
              ctx.shadowBlur = 0;
            }
          });
        }
      }

      if (t < FINAL_STATE) {
        raf = requestAnimationFrame(loop);
      } else {
        // Keep drawing beams indefinitely (subtle idle loop)
        raf = requestAnimationFrame(loop);
      }
    }
    raf = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(raf);
      window.removeEventListener('resize', recalc);
    };
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  return (
    <div ref={containerRef} style={{
      position:'relative',
      height:'500px',
      borderRadius:'16px',
      border:'1px solid rgba(255,255,255,0.09)',
      background:'#0C1117',
      overflow:'hidden',
      boxShadow:'0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.06)',
    }}>
      {/* Background */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',background:'radial-gradient(ellipse 55% 50% at 50% 55%, rgba(14,196,193,0.09) 0%, transparent 65%)'}}/>

      {/* Header */}
      <div style={{position:'absolute',top:0,left:0,right:0,padding:'13px 18px',borderBottom:'1px solid rgba(255,255,255,0.07)',display:'flex',alignItems:'center',gap:'9px',background:'rgba(255,255,255,0.015)',zIndex:10}}>
        <InsightisIcon size={20}/>
        <span style={{fontSize:'13.5px',fontWeight:500,color:'#E0EDF2',letterSpacing:'-0.01em'}}>insightis</span>
      </div>

      {/* Beams canvas */}
      <canvas ref={canvasRef} style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:2}}/>

      {/* Central logo square */}
      <div style={{
        position:'absolute',
        left:'50%',top:'calc(50% + 10px)',
        width:'128px',height:'128px',
        borderRadius:'22px',
        background: phase === 'chaos'
          ? 'rgba(14,196,193,0.02)'
          : 'linear-gradient(135deg, rgba(14,196,193,0.14), rgba(9,160,157,0.06))',
        border: `1px solid rgba(14,196,193,${phase === 'chaos' ? 0.12 : 0.40})`,
        display:'flex',alignItems:'center',justifyContent:'center',
        opacity: phase === 'chaos' ? 0.25 : 1,
        transform: `translate(-50%, -50%) scale(${phase === 'chaos' ? 0.55 : 1})`,
        transition: 'opacity .8s ease, transform 1s cubic-bezier(0.34,1.56,0.64,1), background .6s ease, border-color .6s ease, box-shadow .6s ease',
        boxShadow: phase === 'ordered'
          ? '0 0 70px rgba(14,196,193,0.35), inset 0 0 36px rgba(14,196,193,0.1), 0 0 0 1px rgba(14,196,193,0.2)'
          : 'none',
        zIndex: 4,
      }}>
        <InsightisIcon size={58}/>
      </div>


      {/* Source pills */}
      {SOURCES.map((s, i) => (
        <div key={i} ref={el => sourceRefs.current[i] = el} style={{
          position:'absolute',
          left:'50%',top:'calc(50% + 10px)',
          display:'inline-flex',alignItems:'center',gap:'7px',
          padding:'6px 11px 6px 6px',
          borderRadius:'10px',
          background:'rgba(12,17,23,0.88)',
          border:`1px solid ${s.color}55`,
          fontSize:'11.5px',color:'#E0EDF2',
          fontFamily:'Geist, sans-serif',
          fontWeight:500,
          letterSpacing:'-0.01em',
          whiteSpace:'nowrap',
          willChange:'transform',
          boxShadow:`0 4px 14px rgba(0,0,0,0.45), 0 0 18px ${s.color}22`,
          zIndex:5,
        }}>
          <BrandTile name={s.name} slug={s.slug} domain={s.domain} color={s.color}/>
          {s.name}
        </div>
      ))}
    </div>
  );
}

/* ── CONNECTOR ICON ── */
function ConnectorIcon({ name, slug, abbr, color, bg }) {
  const [failed, setFailed] = useState(false);
  return (
    <div className="connector-icon" style={{background: bg, color: color}}>
      {slug && !failed
        ? <img
            src={`https://cdn.simpleicons.org/${slug}`}
            width="20" height="20"
            alt={name}
            draggable="false"
            onError={() => setFailed(true)}
            style={{display:'block', objectFit:'contain'}}
          />
        : <span>{abbr}</span>
      }
    </div>
  );
}

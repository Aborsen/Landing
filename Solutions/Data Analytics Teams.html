<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/assets/responsive.css">
<title>For Data &amp; Analytics Teams — Insightis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Geist', sans-serif;
  background: #0A0E13;
  color: #E8F2F5;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}

body::after {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(10,152,150,.09) 0%, transparent 70%),
    radial-gradient(ellipse 70% 55% at 85% 0%, rgba(110,60,200,.07) 0%, transparent 65%),
    radial-gradient(ellipse 60% 60% at 75% 45%, rgba(20,80,200,.05) 0%, transparent 60%),
    radial-gradient(ellipse 70% 55% at 5% 55%, rgba(160,50,220,.045) 0%, transparent 65%),
    radial-gradient(ellipse 65% 55% at 50% 90%, rgba(10,152,150,.07) 0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 95% 75%, rgba(50,90,240,.04) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 35% 30%, rgba(200,60,180,.03) 0%, transparent 55%);
}

/* ── ANIMATIONS ── */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── CHAT MOCK ── */
.chat-bubble-user {
  background: rgba(9,160,157,0.12);
  border: 1px solid rgba(9,160,157,0.25);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 13.5px;
  color: #E8F2F5;
  align-self: flex-end;
  max-width: 85%;
}
.chat-bubble-ai {
  background: rgba(255,255,255,0.038);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 14px;
  font-size: 13.5px;
  color: #C0D4DC;
  align-self: flex-start;
  max-width: 95%;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* ── SECTION SPACING ── */
section { position: relative; }

/* ── COMPARISON CARDS ── */
.compare-card {
  border-radius: 16px;
  padding: 28px;
  flex: 1;
}

/* ── QUESTION PILL ── */
.q-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  font-size: 13px; color: #7FA0AC;
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.q-pill:hover {
  border-color: rgba(9,160,157,0.4);
  color: #E8F2F5;
  background: rgba(9,160,157,0.06);
}
.q-pill.active {
  border-color: rgba(9,160,157,0.5);
  color: #0EC4C1;
  background: rgba(9,160,157,0.08);
}

/* ── METRIC PILL ── */
.metric-pill {
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,.07);
  background: rgba(255,255,255,.03);
  font-size: 13px;
  color: #7FA0AC;
  font-family: 'Geist Mono', monospace;
  cursor: default;
  transition: all .15s;
}
.metric-pill:hover {
  border-color: rgba(9,160,157,.4);
  color: #0EC4C1;
  background: rgba(9,160,157,.06);
}

/* ── CONNECTOR CARD ── */
.connector-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px;
  transition: all .18s ease;
  cursor: default;
}
.connector-card:hover {
  background: rgba(255,255,255,.05);
  border-color: rgba(255,255,255,.12);
  transform: translateY(-1px);
}
.connector-icon {
  width: 36px; height: 36px;
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 10px; font-weight: 500;
  font-family: 'Geist Mono', monospace;
  letter-spacing: -.02em;
}

@media (max-width: 768px) {
  [data-hero-grid] { grid-template-columns: 1fr !important; }
  [data-gallery-grid] {
    grid-template-columns: 1fr !important;
    min-height: auto !important;
  }
  [data-gallery-left] {
    flex-direction: row !important;
    overflow-x: auto !important;
    border-right: none !important;
    border-bottom: 1px solid rgba(255,255,255,.05) !important;
    padding: 12px !important;
    gap: 8px !important;
  }
  [data-gallery-left] > div { flex-direction: row !important; gap: 8px !important; }
  [data-gallery-left] > div > div {
    flex: none !important;
    padding: 8px 14px !important;
    border-bottom: none !important;
    border-radius: 999px !important;
    border: 1px solid rgba(255,255,255,.08) !important;
    white-space: nowrap !important;
  }
  [data-steps-grid] { grid-template-columns: 1fr !important; }
  [data-pain-grid] { grid-template-columns: 1fr !important; }
  [data-connectors-grid] { grid-template-columns: repeat(2,1fr) !important; }
  [data-compare-grid] { grid-template-columns: 1fr !important; }
  [data-spotlight-grid] {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }
  [data-spotlight-grid] > [data-spotlight-text] { order: 0 !important; }
  [data-spotlight-grid] > [data-spotlight-visual] { order: 1 !important; }
  [data-usecase-grid] { grid-template-columns: 1fr !important; }
  [data-testimonials-grid] { grid-template-columns: 1fr !important; }
}

/* ── FAQ ── */
.faq-row {
  border-top: 1px solid rgba(255,255,255,.06);
  transition: all .2s;
}
.faq-row:last-child { border-bottom: 1px solid rgba(255,255,255,.06); }
.faq-q {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%; padding: 22px 4px;
  background: transparent; border: none;
  color: #E8F2F5; font-size: 16px; font-weight: 500;
  cursor: pointer; text-align: left;
  font-family: 'Geist', sans-serif;
  transition: color .15s;
}
.faq-q:hover { color: #0EC4C1; }
.faq-q svg { transition: transform .25s ease; flex-shrink: 0; }
.faq-q.open svg { transform: rotate(180deg); color: #0EC4C1; }
.faq-a {
  max-height: 0; overflow: hidden;
  transition: max-height .3s ease;
  color: #7FA0AC; font-size: 14.5px; line-height: 1.7;
}
.faq-a.open { max-height: 400px; padding: 0 4px 22px; }
</style>
</head>
<body>

<div id="root"></div>

<script type="module" src="/src/pages/data-analytics-teams.jsx"></script>
<script defer src="/assets/header-scroll.js"></script>
</body>
</html>

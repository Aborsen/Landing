<title>For Executive Teams — Insightis</title>
<meta name="description" content="Insightis for executive teams — every business metric (MRR, CAC, runway, growth) at your fingertips. Ask in plain English, get answers grounded in your real data, not generic AI averages.">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--ins-font-family-sans);
  background: var(--ins-surface-page);
  color: var(--ins-color-gray-50);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: var(--ins-z-base);
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  opacity: .4; mix-blend-mode: overlay;
}



/* ── ANIMATIONS ── */
@keyframes fadeUp { from{transform:translateY(20px)} to{transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes typing { from{width:0} to{width:100%} }
@keyframes blink  { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse  { 0%,100%{opacity:.4;transform:scale(.85)} 50%{opacity:1;transform:scale(1)} }
@keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
@keyframes marquee-left { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
.marquee-left { animation: marquee-left 40s linear infinite; }
.marquee-container:hover .marquee-left { animation-play-state: paused; }

.fu0 { animation: fadeUp .7s ease both; }
.fu1 { animation: fadeUp .7s ease .1s both; }
.fu2 { animation: fadeUp .7s ease .2s both; }
.fu3 { animation: fadeUp .7s ease .35s both; }
.fu4 { animation: fadeUp .7s ease .5s both; }

/* ── CHAT MOCK ── */
.chat-bubble-user {
  background: rgba(9,160,157,0.12);
  border: 1px solid rgba(9,160,157,0.25);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 13.5px;
  color: var(--ins-color-gray-50);
  align-self: flex-end;
  max-width: 85%;
}
.chat-bubble-ai {
  background: rgba(255,255,255,0.038);
  border: 1px solid var(--ins-color-white-a-07);
  border-radius: 4px 16px 16px 16px;
  padding: 12px 14px;
  font-size: 13.5px;
  color: var(--ins-color-gray-100);
  align-self: flex-start;
  max-width: 95%;
  line-height: 1.6;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--ins-color-white-a-10); border-radius: var(--ins-radius-2); }

/* ── SECTION SPACING ── */
section { position: relative; }

/* ── COMPARISON CARDS ── */
.compare-card {
  border-radius: var(--ins-radius-16);
  padding: var(--ins-size-7);
  flex: 1;
}

/* ── QUESTION PILL ── */
.q-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px; border-radius: 999px;
  border: 1px solid var(--ins-color-white-a-07);
  background: var(--ins-color-white-a-03);
  font-size: 13px; color: var(--ins-text-inactive);
  cursor: pointer; transition: all .15s;
  white-space: nowrap;
}
.q-pill:hover {
  border-color: rgba(9,160,157,0.4);
  color: var(--ins-color-gray-50);
  background: rgba(9,160,157,0.06);
}
.q-pill.active {
  border-color: var(--ins-color-teal-a-50);
  color: var(--ins-text-highlight);
  background: var(--ins-color-teal-a-08);
}

/* ── METRIC PILL ── */
.metric-pill {
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--ins-color-white-a-07);
  background: var(--ins-color-white-a-03);
  font-size: 13px;
  color: var(--ins-text-inactive);
  font-family: var(--ins-font-family-mono);
  cursor: default;
  transition: all .15s;
}
.metric-pill:hover {
  border-color: rgba(9,160,157,.4);
  color: var(--ins-text-highlight);
  background: rgba(9,160,157,.06);
}

/* ── CONNECTOR CARD ── */
@media (max-width: 768px) {
  [data-hero-grid] { grid-template-columns: 1fr !important; }
  [data-gallery-grid] {
    grid-template-columns: 1fr !important;
    min-height: auto !important;
  }
  [data-gallery-left] {
    flex-direction: row !important;
    overflow-x: auto !important;
    border-right: none !important;
    border-bottom: 1px solid var(--ins-color-white-a-05) !important;
    padding: 12px !important;
    gap: 8px !important;
  }
  [data-gallery-left] > div { flex-direction: row !important; gap: 8px !important; }
  [data-gallery-left] > div > div {
    flex: none !important;
    padding: 8px 14px !important;
    border-bottom: none !important;
    border-radius: 999px !important;
    border: 1px solid var(--ins-color-white-a-08) !important;
    white-space: nowrap !important;
  }
  [data-steps-grid] { grid-template-columns: 1fr !important; }
  [data-pain-grid] { grid-template-columns: 1fr !important; }
  [data-connectors-grid] { grid-template-columns: repeat(2,1fr) !important; }
  [data-compare-grid] { grid-template-columns: 1fr !important; }
  [data-spotlight-grid] {
    grid-template-columns: 1fr !important;
    gap: 32px !important;
  }
  [data-spotlight-grid] > [data-spotlight-text] { order: 0 !important; }
  [data-spotlight-grid] > [data-spotlight-visual] { order: 1 !important; }
  [data-usecase-grid] { grid-template-columns: 1fr !important; }
  [data-testimonials-grid] { grid-template-columns: 1fr !important; }
}
